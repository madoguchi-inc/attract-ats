// Supabase REST API ヘルパー
const sbApi = {
  _headers(withAuth = true) {
    const h = { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
    if (withAuth && tokenStore.accessToken) h['Authorization'] = 'Bearer ' + tokenStore.accessToken;
    return h;
  },
  // 認証: ログイン
  async signIn(email, password) {
    const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST', headers: this._headers(false),
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) return { user: null, error: data };
    tokenStore.save(data);
    return { user: data.user, error: null };
  },
  // 認証: 現在のユーザー取得
  async getUser() {
    if (!tokenStore.accessToken) return null;
    const res = await fetch(SUPABASE_URL + '/auth/v1/user', { headers: this._headers() });
    if (!res.ok) { tokenStore.clear(); return null; }
    return await res.json();
  },
  // 認証: ログアウト
  async signOut() {
    await fetch(SUPABASE_URL + '/auth/v1/logout', { method: 'POST', headers: this._headers() }).catch(() => {});
    tokenStore.clear();
  },
  // DB: SELECT
  async select(table, params = '') {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?select=*' + (params ? '&' + params : ''), { headers: this._headers() });
    if (!res.ok) return { data: null, error: await res.json() };
    return { data: await res.json(), error: null };
  },
  // DB: INSERT
  async insert(table, row) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table, {
      method: 'POST', headers: { ...this._headers(), 'Prefer': 'return=representation' },
      body: JSON.stringify(row)
    });
    if (!res.ok) return { data: null, error: await res.json() };
    const data = await res.json();
    return { data: data[0] || data, error: null };
  },
  // 認証: サインアップ（招待用）
  async signUp(email, password, metadata = {}) {
    const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
      method: 'POST', headers: this._headers(false),
      body: JSON.stringify({ email, password, data: metadata })
    });
    const data = await res.json();
    if (!res.ok) return { user: null, error: data };
    return { user: data.user || data, error: null };
  },
  // DB: DELETE
  async remove(table, filter) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + filter, {
      method: 'DELETE', headers: this._headers()
    });
    if (!res.ok) return { error: await res.json() };
    return { error: null };
  },
  // DB: UPDATE
  async update(table, filter, row) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + filter, {
      method: 'PATCH', headers: { ...this._headers(), 'Prefer': 'return=representation' },
      body: JSON.stringify(row)
    });
    if (!res.ok) return { error: await res.json() };
    return { error: null };
  }
};

// ============================================================
// データマイグレーション: 549件を新8ステージに再配分
// ============================================================
async function runDataMigration(onProgress) {
  if (!SUPABASE_READY) { alert('Supabase未接続のため実行できません'); return false; }
  onProgress && onProgress('候補者データを取得中...');

  // 1) 全候補者ID取得
  const { data: allCandidates, error } = await sbApi.select('candidates', 'select=id&order=id.asc&limit=1000');
  if (error || !allCandidates) { alert('データ取得エラー'); return false; }
  const total = allCandidates.length;
  onProgress && onProgress('取得完了: ' + total + '件。ステージ再配分中...');

  // 2) リアルな選考ファネル分布を設計
  //    エントリー(100%) → 説明会(75%) → 一次(55%) → 適性(40%) → 二次(28%) → 最終(18%) → 内定(10%) → 承諾(7%)
  //    各ステージで一部が離脱（辞退・不合格・保留）
  const distribution = [
    { stage: 'エントリー', pct: 0.12, subs: [
      { sub: '受付済', w: 2 }, { sub: '書類確認中', w: 3 }, { sub: '書類通過', w: 5 },
      { sub: '辞退', w: 2 }, { sub: '不合格', w: 3 }
    ]},
    { stage: '説明会', pct: 0.14, subs: [
      { sub: '案内済', w: 1 }, { sub: '予約済', w: 2 }, { sub: '参加済', w: 5 }, { sub: '欠席', w: 2 },
      { sub: '辞退', w: 2 }, { sub: '不合格', w: 1 }
    ]},
    { stage: '一次面接', pct: 0.16, subs: [
      { sub: '日程調整中', w: 2 }, { sub: '予約済', w: 2 }, { sub: '実施済', w: 4 }, { sub: '合格', w: 5 },
      { sub: '辞退', w: 2 }, { sub: '不合格', w: 4 }
    ]},
    { stage: '適性テスト', pct: 0.12, subs: [
      { sub: '案内済', w: 2 }, { sub: '受験済', w: 4 }, { sub: '合格', w: 5 },
      { sub: '辞退', w: 1 }, { sub: '不合格', w: 3 }
    ]},
    { stage: '二次面接', pct: 0.14, subs: [
      { sub: '日程調整中', w: 2 }, { sub: '予約済', w: 2 }, { sub: '実施済', w: 3 }, { sub: '合格', w: 4 },
      { sub: '辞退', w: 3 }, { sub: '不合格', w: 4 }, { sub: '保留', w: 1 }
    ]},
    { stage: '最終面接', pct: 0.12, subs: [
      { sub: '日程調整中', w: 2 }, { sub: '予約済', w: 2 }, { sub: '実施済', w: 3 }, { sub: '合格', w: 4 },
      { sub: '辞退', w: 2 }, { sub: '不合格', w: 3 }, { sub: '保留', w: 1 }
    ]},
    { stage: '内定', pct: 0.10, subs: [
      { sub: '内定通知', w: 2 }, { sub: '面談調整中', w: 3 }, { sub: '面談実施済', w: 4 },
      { sub: '辞退', w: 3 }, { sub: '保留', w: 1 }
    ]},
    { stage: '内定承諾', pct: 0.10, subs: [
      { sub: '承諾済', w: 5 }, { sub: '入社準備中', w: 3 }, { sub: '入社済', w: 2 },
      { sub: '承諾後辞退', w: 1 }
    ]},
  ];

  // 重み付きランダム選択
  function weightedRandom(items) {
    const totalW = items.reduce((s, i) => s + i.w, 0);
    let r = Math.random() * totalW;
    for (const item of items) {
      r -= item.w;
      if (r <= 0) return item.sub;
    }
    return items[items.length - 1].sub;
  }

  // 3) 各候補者にステージ＆サブステータスを割り当て
  const assignments = [];
  let idx = 0;
  // まず各ステージに人数を割り当て
  const stageCounts = distribution.map(d => Math.round(total * d.pct));
  // 端数調整
  const diff = total - stageCounts.reduce((s, c) => s + c, 0);
  stageCounts[0] += diff; // エントリーで調整

  for (let si = 0; si < distribution.length; si++) {
    const stg = distribution[si];
    const count = stageCounts[si];
    for (let j = 0; j < count && idx < total; j++, idx++) {
      const sub = weightedRandom(stg.subs);
      assignments.push({ id: allCandidates[idx].id, stage: stg.stage, substatus: sub });
    }
  }

  // 4) バッチ更新 (20件ずつ)
  const batchSize = 20;
  let done = 0;
  for (let i = 0; i < assignments.length; i += batchSize) {
    const batch = assignments.slice(i, i + batchSize);
    const promises = batch.map(a =>
      sbApi.update('candidates', 'id=eq.' + a.id, { stage: a.stage, substatus: a.substatus })
    );
    await Promise.all(promises);
    done += batch.length;
    onProgress && onProgress('更新中... ' + done + '/' + total + '件');
  }

  onProgress && onProgress('完了！ ' + total + '件のデータを更新しました');
  return true;
}

// ステージ名からステージ定義を取得するヘルパー
const getStageDefByName = (name) => STAGE_DEFINITIONS.find(s => s.name === name);
const getStageDefById = (id) => STAGE_DEFINITIONS.find(s => s.id === id);
const STAGE_NAMES = STAGE_DEFINITIONS.map(s => s.name);

// 日程調整対象ステージを推定するヘルパー
// 現ステージの substatus が「合格」「実施済」→ 次の面接ステージを返す
// それ以外 → 現ステージをそのまま返す（現ステージが面接系で「日程調整中」等の場合）
const INTERVIEW_STAGE_IDS = ["interview1", "interview2", "final"];
function inferSchedulingStage(currentStage, currentSubstatus) {
  const currentDef = getStageDefByName(currentStage);
  if (!currentDef) return { stage: currentStage, isAdvanced: false };

  // 現ステージで「合格」「実施済」「参加済」「書類通過」「受験済」→ 次ステージが必要
  const advancedSubs = ["合格", "実施済", "参加済", "書類通過", "受験済"];
  if (advancedSubs.includes(currentSubstatus)) {
    // 次のステージを探す（orderが現在より大きいもので、面接系または日程調整があるもの）
    const nextStages = STAGE_DEFINITIONS.filter(s => s.order > currentDef.order && s.substatuses.includes("日程調整中"));
    if (nextStages.length > 0) {
      return { stage: nextStages[0].name, isAdvanced: true };
    }
    // 日程調整中がないステージ（内定等）→ 次ステージの最初のサブステータス
    const nextAll = STAGE_DEFINITIONS.filter(s => s.order > currentDef.order);
    if (nextAll.length > 0) {
      return { stage: nextAll[0].name, isAdvanced: true };
    }
  }

  // 現ステージが面接系で日程調整が必要な場合（日程調整中、予約済以前）→ そのまま
  return { stage: currentStage, isAdvanced: false };
}

// 候補者のstageからパイプラインステージIDへのマッピング
function candidateToStageId(stage) {
  if (!stage) return "entry";
  for (const def of STAGE_DEFINITIONS) {
    if (stage === def.name) return def.id;
    if (stage.startsWith(def.name)) return def.id;
  }
  // レガシーマッピング
  if (stage.includes("エントリー")) return "entry";
  if (stage.includes("説明会")) return "briefing";
  if (stage.includes("1次") || stage.includes("一次")) return "interview1";
  if (stage.includes("適性")) return "aptitude";
  if (stage.includes("2次") || stage.includes("二次")) return "interview2";
  if (stage.includes("最終")) return "final";
  if (stage.includes("内定承諾") || stage.includes("承諾")) return "accepted";
  if (stage.includes("内定")) return "offer";
  return "entry";
}

function LoginPage({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError(null);
    if (SUPABASE_READY) {
      const { user, error: authError } = await sbApi.signIn(email, password);
      if (authError) {
        setError("ログインに失敗しました: " + (authError.error_description || authError.msg || JSON.stringify(authError)));
        setLoading(false);
        return;
      }
      onLogin(user);
    } else {
      // デモモード（Supabase未設定時）
      if (email && password) {
        onLogin({ email, id: "demo" });
      } else {
        setError("メールアドレスとパスワードを入力してください");
      }
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg, #0d2eb5 0%, #1d4aff 50%, #3562f6 100%)" }}>
      <div style={{ background: "white", borderRadius: 20, padding: "48px 40px", width: 400, boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <img src="logo.svg" alt="Attract" style={{ width: 200, marginBottom: 4, filter: "brightness(0) saturate(100%) invert(22%) sepia(93%) saturate(4000%) hue-rotate(228deg) brightness(100%) contrast(102%)" }} />
          <div style={{ fontSize: 13, color: "#6b7280" }}>採用管理システム</div>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6 }}>メールアドレス</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com"
              style={{ width: "100%", padding: "10px 14px", border: "1px solid #d1d5db", borderRadius: 10, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ marginBottom: 24 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#374151", marginBottom: 6 }}>パスワード</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="パスワードを入力"
              style={{ width: "100%", padding: "10px 14px", border: "1px solid #d1d5db", borderRadius: 10, fontSize: 14, outline: "none", boxSizing: "border-box" }} />
          </div>
          {error && (
            <div style={{ padding: "10px 14px", background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, color: "#dc2626", fontSize: 12, marginBottom: 16 }}>{error}</div>
          )}
          <button type="submit" disabled={loading}
            style={{ width: "100%", padding: "12px", background: loading ? "#a5b4fc" : "#4338ca", color: "white", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: loading ? "default" : "pointer" }}>
            {loading ? "ログイン中..." : "ログイン"}
          </button>
        </form>
        {!SUPABASE_READY && (
          <div style={{ marginTop: 20, padding: "12px 14px", background: "#fefce8", border: "1px solid #fde68a", borderRadius: 8, fontSize: 11, color: "#92400e" }}>

          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// データ取得フック
// ============================================================
function useSupabaseCandidates(recruitFilter) {
  const [candidates, setCandidates] = useState(CANDIDATES);
  const [loading, setLoading] = useState(false);

  // LINE連携の紐付け画面で候補者一覧を参照できるようにグローバルに公開
  useEffect(() => { window.__ats_candidates = candidates; }, [candidates]);

  const fetchCandidates = useCallback(async () => {
    if (!SUPABASE_READY) { setCandidates(CANDIDATES); return; }
    setLoading(true);
    let params = 'order=created_at.desc';
    if (recruitFilter !== 'all') params += '&recruit_type=eq.' + encodeURIComponent(recruitFilter);
    const { data, error } = await sbApi.select('candidates', params);
    if (!error && data) {
      // DB のカラム名 → フロントのキー名にマッピング
      setCandidates(data.map(r => ({
        id: r.id,
        recruitType: r.recruit_type,
        lastName: r.last_name,
        firstName: r.first_name,
        university: r.university,
        faculty: r.faculty,
        gradYear: r.grad_year,
        majorType: r.major_type,
        company: r.company,
        position: r.position,
        experience: r.experience,
        stage: r.stage,
        substatus: r.substatus,
        status: r.status,
        format: r.format,
        email: r.email,
        phone: r.phone,
        route: r.route,
        aspiration: r.aspiration,
        agent: r.agent,
        gender: r.gender,
        score: r.score ? parseFloat(r.score) : null,
        createdAt: new Date(r.created_at).toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/-/g, '/'),
        entryDate: r.entry_date || null,
        birthDate: r.birth_date || null,
        graduationPeriod: r.graduation_period || null,
        department: r.department || null,
        lastNameKana: r.last_name_kana || null,
        firstNameKana: r.first_name_kana || null,
        notes: r.notes || null,
        stageDate: r.stage_date || null,
        originalStage: r.original_stage || null,
        lineUserId: r.line_user_id || null,
      })));
    }
    setLoading(false);
  }, [recruitFilter]);

  useEffect(() => { fetchCandidates(); }, [fetchCandidates]);

  const addCandidate = async (newCandidate) => {
    if (!SUPABASE_READY) {
      const maxId = Math.max(...candidates.map(c => c.id));
      const withId = { ...newCandidate, id: maxId + 1, createdAt: new Date().toLocaleDateString('ja-JP').replace(/-/g, '/') };
      setCandidates(prev => [withId, ...prev]);
      return withId;
    }
    const { data, error } = await sbApi.insert('candidates', {
      recruit_type: newCandidate.recruitType,
      last_name: newCandidate.lastName,
      first_name: newCandidate.firstName,
      last_name_kana: newCandidate.lastNameKana || null,
      first_name_kana: newCandidate.firstNameKana || null,
      university: newCandidate.university || null,
      faculty: newCandidate.faculty || null,
      department: newCandidate.department || null,
      grad_year: newCandidate.gradYear || null,
      major_type: newCandidate.majorType || null,
      graduation_period: newCandidate.graduationPeriod || null,
      company: newCandidate.company || null,
      position: newCandidate.position || null,
      experience: newCandidate.experience || null,
      stage: newCandidate.stage || 'エントリー',
      substatus: newCandidate.substatus || '受付済',
      status: newCandidate.status || '新規',
      format: newCandidate.format || null,
      email: newCandidate.email || null,
      phone: newCandidate.phone || null,
      route: newCandidate.route || null,
      aspiration: newCandidate.aspiration || 3,
      agent: newCandidate.agent || null,
      gender: newCandidate.gender || null,
      birth_date: newCandidate.birthDate || null,
      entry_date: newCandidate.entryDate || null,
      notes: newCandidate.notes || null,
    });
    if (!error) await fetchCandidates();
    return data;
  };

  const updateCandidate = async (id, updates) => {
    if (!SUPABASE_READY) {
      setCandidates(prev => prev.map(c => c.id === id ? { ...c, ...updates } : c));
      return;
    }
    // camelCase → snake_case
    const dbUpdates = {};
    if (updates.stage !== undefined) dbUpdates.stage = updates.stage;
    if (updates.substatus !== undefined) dbUpdates.substatus = updates.substatus;
    if (updates.status !== undefined) dbUpdates.status = updates.status;
    if (updates.format !== undefined) dbUpdates.format = updates.format;
    if (updates.score !== undefined) dbUpdates.score = updates.score;
    if (updates.aspiration !== undefined) dbUpdates.aspiration = updates.aspiration;
    await sbApi.update('candidates', 'id=eq.' + id, dbUpdates);
    await fetchCandidates();
  };

  const bulkUpdateStatus = async (ids, newStatus) => {
    if (!SUPABASE_READY) {
      setCandidates(prev => prev.map(c => ids.has(c.id) ? { ...c, status: newStatus } : c));
      return;
    }
    const idList = Array.from(ids).join(',');
    await sbApi.update('candidates', 'id=in.(' + idList + ')', { status: newStatus });
    await fetchCandidates();
  };

  return { candidates, loading, addCandidate, updateCandidate, bulkUpdateStatus, refresh: fetchCandidates };
}

function CandidatesPage({ onNavigate, recruitFilter, pipelineFilter, onClearPipelineFilter, candidates: propCandidates, onUpdateCandidate, onBulkUpdateStatus, onShowAddModal, can = () => true, emailTemplates = [] }) {
  // propCandidatesが渡されればそれを使用、なければフォールバック
  const CANDS = propCandidates || CANDIDATES;
  const [searchTerm, setSearchTerm] = useState("");
  const [stageFilter, setStageFilter] = useState("all");
  const [checkedSubstatuses, setCheckedSubstatuses] = useState(new Set()); // チェックされたサブステータス（空 = 全て）
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [showBulkStatus, setShowBulkStatus] = useState(false);
  const [bulkToast, setBulkToast] = useState(null);
  // メール一括送信モーダル
  const [bulkEmailOpen, setBulkEmailOpen] = useState(false);
  const [bulkEmailData, setBulkEmailData] = useState({ subject: "", body: "", cc: "" });
  const [bulkEmailSending, setBulkEmailSending] = useState(false);
  const [bulkEmailStep, setBulkEmailStep] = useState("compose"); // compose | preview | done
  // LINE一括送信モーダル
  const [bulkLineOpen, setBulkLineOpen] = useState(false);
  const [bulkLineData, setBulkLineData] = useState({ message: "" });
  const [bulkLineSending, setBulkLineSending] = useState(false);
  const [bulkLineStep, setBulkLineStep] = useState("compose");

  // パイプラインステージ名でフィルタに使えるステージ一覧
  const stages = ["all", ...STAGE_NAMES];

  // 有効なステージを判定
  const effectiveStageFilter = pipelineFilter ? pipelineFilter.stageName : stageFilter;

  // 現在のステージに対応するサブステータス一覧（件数付き）
  const substatusOptions = useMemo(() => {
    const activeStage = pipelineFilter ? pipelineFilter.stageName : (stageFilter !== "all" ? stageFilter : null);
    if (!activeStage) return [];
    const dynPipeline = buildPipelineFromCandidates(CANDS);
    const pipelineEntry = dynPipeline.find(s => s.name === activeStage);
    if (!pipelineEntry) return [];
    return pipelineEntry.substages.map(s => {
      return { status: s.status, count: s.staying, isAlert: s.isAlert };
    });
  }, [effectiveStageFilter, recruitFilter]);

  // pipelineFilter到着時のチェック状態（該当サブステータスだけON）
  const effectiveChecked = pipelineFilter
    ? new Set([pipelineFilter.substatus])
    : checkedSubstatuses;

  const filtered = CANDS.filter(c => {
    const matchRecruit = recruitFilter === "all" || c.recruitType === recruitFilter;
    const searchTarget = recruitFilter === "中途" || c.recruitType === "中途"
      ? `${c.lastName}${c.firstName}${c.company || ""}${c.position || ""}`
      : `${c.lastName}${c.firstName}${c.university || ""}`;
    const matchSearch = searchTarget.includes(searchTerm);
    // ステージフィルタ
    let matchStage = true;
    if (effectiveStageFilter !== "all") {
      const mappedStage = PIPELINE_STAGE_MAP[effectiveStageFilter] || effectiveStageFilter;
      matchStage = c.stage === effectiveStageFilter || c.stage === mappedStage;
    }
    // サブステータスフィルタ（チェックボックス）：何もチェックされていなければ全表示
    let matchSubstatus = true;
    if (effectiveChecked.size > 0) {
      matchSubstatus = effectiveChecked.has(c.substatus);
    }
    return matchRecruit && matchSearch && matchStage && matchSubstatus;
  });

  const toggleSubstatusCheck = (status) => {
    if (pipelineFilter) onClearPipelineFilter();
    setCheckedSubstatuses(prev => {
      const next = new Set(prev);
      next.has(status) ? next.delete(status) : next.add(status);
      return next;
    });
  };
  const clearSubstatusChecks = () => {
    if (pipelineFilter) onClearPipelineFilter();
    setCheckedSubstatuses(new Set());
  };

  // ===== CSVインポート =====
  const [csvModalOpen, setCsvModalOpen] = useState(false);
  const [csvStep, setCsvStep] = useState("upload"); // upload | preview | importing | done
  const [csvRawData, setCsvRawData] = useState([]);
  const [csvHeaders, setCsvHeaders] = useState([]);
  const [csvMapping, setCsvMapping] = useState({});
  const [csvImportResult, setCsvImportResult] = useState(null);
  const csvFileRef = useRef(null);

  const CSV_TEMPLATE_COLS = [
    { key: "lastName", label: "姓", required: true, example: "山田" },
    { key: "firstName", label: "名", required: true, example: "太郎" },
    { key: "email", label: "メールアドレス", required: false, example: "taro@example.com" },
    { key: "phone", label: "電話番号", required: false, example: "090-1234-5678" },
    { key: "recruitType", label: "区分", required: true, example: "新卒" },
    { key: "university", label: "大学", required: false, example: "東京大学" },
    { key: "faculty", label: "学部", required: false, example: "経済学部" },
    { key: "gradYear", label: "卒業年", required: false, example: "2027" },
    { key: "majorType", label: "文理", required: false, example: "文系" },
    { key: "company", label: "現職企業", required: false, example: "〇〇株式会社" },
    { key: "position", label: "職種", required: false, example: "営業" },
    { key: "experience", label: "経験年数", required: false, example: "5" },
    { key: "stage", label: "選考ステージ", required: false, example: "エントリー" },
    { key: "substatus", label: "サブステータス", required: false, example: "受付済" },
    { key: "route", label: "流入経路", required: false, example: "リクナビ" },
    { key: "agent", label: "エージェント", required: false, example: "〇〇エージェント" },
    { key: "aspiration", label: "志望度(1-5)", required: false, example: "4" },
    { key: "gender", label: "性別", required: false, example: "男性" },
    { key: "format", label: "選考形態", required: false, example: "WEB" },
  ];

  const downloadCsvTemplate = () => {
    const bom = "\uFEFF";
    const header = CSV_TEMPLATE_COLS.map(c => c.label).join(",");
    const example = CSV_TEMPLATE_COLS.map(c => c.example).join(",");
    const blob = new Blob([bom + header + "\n" + example + "\n"], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "候補者インポートテンプレート.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  const parseCSV = (text) => {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return { headers: [], rows: [] };
    const parseLine = (line) => {
      const result = []; let current = ""; let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') { inQuote = !inQuote; }
        else if (line[i] === ',' && !inQuote) { result.push(current.trim()); current = ""; }
        else { current += line[i]; }
      }
      result.push(current.trim());
      return result;
    };
    const headers = parseLine(lines[0]);
    const rows = lines.slice(1).map(l => parseLine(l)).filter(r => r.some(c => c));
    return { headers, rows };
  };

  const handleCsvFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { headers, rows } = parseCSV(ev.target.result);
      setCsvHeaders(headers);
      setCsvRawData(rows);
      // 自動マッピング
      const mapping = {};
      CSV_TEMPLATE_COLS.forEach(col => {
        const idx = headers.findIndex(h => h === col.label || h.toLowerCase() === col.key.toLowerCase() || h === col.key);
        if (idx >= 0) mapping[col.key] = idx;
      });
      setCsvMapping(mapping);
      setCsvStep("preview");
    };
    reader.readAsText(file, "UTF-8");
  };

  const executeCsvImport = async () => {
    setCsvStep("importing");
    let success = 0; let failed = 0; const errors = [];
    for (let i = 0; i < csvRawData.length; i++) {
      const row = csvRawData[i];
      try {
        const record = {};
        CSV_TEMPLATE_COLS.forEach(col => {
          if (csvMapping[col.key] !== undefined) {
            let val = row[csvMapping[col.key]] || "";
            if (col.key === "gradYear" || col.key === "experience" || col.key === "aspiration") val = val ? parseInt(val, 10) || null : null;
            record[col.key] = val || null;
          }
        });
        // 必須チェック
        if (!record.lastName && !record.firstName) { failed++; errors.push(`行${i+1}: 氏名が空`); continue; }
        if (!record.recruitType) record.recruitType = "新卒";
        if (!record.stage) record.stage = "エントリー";
        if (!record.substatus) record.substatus = "受付済";
        // Supabase insert
        if (SUPABASE_READY) {
          const snakeRecord = {
            last_name: record.lastName, first_name: record.firstName, email: record.email, phone: record.phone,
            recruit_type: record.recruitType, university: record.university, faculty: record.faculty,
            grad_year: record.gradYear, major_type: record.majorType, company: record.company, position: record.position,
            experience: record.experience, stage: record.stage, substatus: record.substatus, status: record.substatus || "受付済",
            route: record.route, agent: record.agent, aspiration: record.aspiration, gender: record.gender, format: record.format,
          };
          const { error } = await sbApi.insert('candidates', snakeRecord);
          if (error) { failed++; errors.push(`行${i+1}: ${error.message || "DB登録エラー"}`); continue; }
        }
        success++;
      } catch (err) { failed++; errors.push(`行${i+1}: ${err.message}`); }
    }
    setCsvImportResult({ success, failed, errors, total: csvRawData.length });
    setCsvStep("done");
  };

  const resetCsvModal = () => {
    setCsvModalOpen(false); setCsvStep("upload"); setCsvRawData([]); setCsvHeaders([]); setCsvMapping({}); setCsvImportResult(null);

      if (!NETLIFY_DOMAIN_CL) { alert('Netlify Functions が利用できません'); setBulkLineSending(false); return; }
      const res = await fetch(NETLIFY_DOMAIN_CL + '/.netlify/functions/line-send', {
        method: 'POST',

                <div style={{ marginBottom: 12 }}>

                    <div style={{ fontSize: 14, fontWeight: 600, color: "#111827", marginBottom: 12 }}>
                      {bulkEmailData.subject.replace(/\{\{name\}\}/g, `${selectedCandidates[0]?.lastName || ""}${selectedCandidates[0]?.firstName || ""}`).replace(/\{\{company\}\}/g, "株式会社madoguchi")}

      {/* ===== LINE一括送信モーダル ===== */}
      {bulkLineOpen && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}

                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap", padding: "8px 12px", background: "#f0fdf4", borderRadius: 8, border: "1px solid #bbf7d0", maxHeight: 60, overflowY: "auto" }}>

                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                    <label style={{ fontSize: 11, fontWeight: 600, color: "#6b7280" }}>メッセージ *</label>
                    <select onChange={e => { if (!e.target.value) return; try { const t = JSON.parse(localStorage.getItem('ats_line_templates') || '[]'); const tpl = (t.length ? t : DEFAULT_LINE_TEMPLATES).find(x => x.id === e.target.value); if (tpl) setBulkLineData({...bulkLineData, message: tpl.body}); } catch(err) {} e.target.value = ""; }}
                      style={{ padding: "3px 8px", border: "1px solid #d1d5db", borderRadius: 6, fontSize: 11, color: "#6b7280", background: "white", cursor: "pointer" }}>
                      <option value="">📝 テンプレート選択</option>
                      {(() => { try { const t = JSON.parse(localStorage.getItem('ats_line_templates') || '[]'); return t.length ? t : DEFAULT_LINE_TEMPLATES; } catch(e) { return DEFAULT_LINE_TEMPLATES; } })().map(t => (

                  <textarea value={bulkLineData.message} onChange={e => setBulkLineData({...bulkLineData, message: e.target.value})}

                </div>
              </>)}
              {bulkLineStep === "preview" && (<>
                <div style={{ background: "#f0fdf4", borderRadius: 10, padding: 16, border: "1px solid #bbf7d0" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#15803d", marginBottom: 8 }}>プレビュー</div>
                  <div style={{ background: "white", borderRadius: 12, padding: 14, fontSize: 13, color: "#374151", whiteSpace: "pre-wrap", lineHeight: 1.7, border: "1px solid #e5e7eb", borderBottomLeftRadius: 4 }}>
                    {bulkLineData.message.replace(/\{\{name\}\}/g, `${selectedCandidates[0]?.lastName || ""}${selectedCandidates[0]?.firstName || ""}`)}

              </>)}
              {bulkLineStep === "done" && (
                <div style={{ textAlign: "center", padding: 40 }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#111827", marginBottom: 4 }}>送信完了</div>
                  <div style={{ fontSize: 13, color: "#6b7280" }}>{selectedCandidates.length}名にLINEを送信しました</div>
                </div>
              )}
            </div>

            <div style={{ padding: "16px 24px", borderTop: "1px solid #e5e7eb", display: "flex", justifyContent: "space-between" }}>
              {bulkLineStep === "compose" && (<>
                <button onClick={closeBulkLine} style={{ padding: "8px 20px", border: "1px solid #d1d5db", borderRadius: 8, background: "white", color: "#374151", fontSize: 13, cursor: "pointer" }}>キャンセル</button>
                <button onClick={() => { if (!bulkLineData.message) { alert("メッセージを入力してください"); return; } setBulkLineStep("preview"); }}
                  style={{ padding: "8px 20px", border: "none", borderRadius: 8, background: "#06c755", color: "white", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>

                </button>
              </>)}
              {bulkLineStep === "preview" && (<>
                <button onClick={() => setBulkLineStep("compose")} style={{ padding: "8px 20px", border: "1px solid #d1d5db", borderRadius: 8, background: "white", color: "#374151", fontSize: 13, cursor: "pointer" }}>← 編集に戻る</button>

                    <div style={{ fontSize: 13, fontWeight: 600, color: "#4338ca" }}>テンプレートCSV</div>

                  </button>

                  ※ 必須項目: 姓、名、区分（新卒/中途）
                </div>
              </>

            {/* ステップ2: プレビュー */}

                <div style={{ marginBottom: 16, padding: 12, background: "#f0fdf4", borderRadius: 8, border: "1px solid #bbf7d0", fontSize: 13, color: "#15803d" }}>

                    {CSV_TEMPLATE_COLS.map(col => (
                      <div key={col.key} style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", background: "#f9fafb", borderRadius: 8, fontSize: 12 }}>

                        <select value={csvMapping[col.key] ?? ""} onChange={e => setCsvMapping({...csvMapping, [col.key]: e.target.value === "" ? undefined : parseInt(e.target.value)})}
                          style={{ flex: 1, padding: "3px 4px", border: "1px solid #e5e7eb", borderRadius: 4, fontSize: 11, minWidth: 0 }}>
                          <option value="">-- 未設定 --</option>

                          <th key={col.key} style={{ padding: "6px 8px", borderBottom: "1px solid #e5e7eb", textAlign: "left", color: "#6b7280", whiteSpace: "nowrap" }}>{col.label}</th>

                      </tr>

                      {csvRawData.slice(0, 5).map((row, i) => (
                        <tr key={i} style={{ borderBottom: "1px solid #f3f4f6" }}>
                          <td style={{ padding: "6px 8px", color: "#9ca3af" }}>{i + 1}</td>
                          {CSV_TEMPLATE_COLS.filter(c => csvMapping[c.key] !== undefined).map(col => (
                            <td key={col.key} style={{ padding: "6px 8px", color: "#374151", maxWidth: 120, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                              {row[csvMapping[col.key]] || <span style={{ color: "#d1d5db" }}>—</span>}
                            </td>
                          ))}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <button onClick={() => { setCsvStep("upload"); setCsvRawData([]); setCsvHeaders([]); }}
                    style={{ padding: "10px 20px", border: "1px solid #e5e7eb", borderRadius: 8, background: "white", color: "#6b7280", fontSize: 13, cursor: "pointer" }}>
                    ← 戻る
                  </button>
                  <button onClick={executeCsvImport}
                    style={{ padding: "10px 28px", border: "none", borderRadius: 8, background: "#6366f1", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                    {csvRawData.length}件をインポート
                  </button>
                </div>
              </>
            )}

            {/* ステップ3: インポート中 */}
            {csvStep === "importing" && (
              <div style={{ padding: 40, textAlign: "center" }}>
                <div style={{ fontSize: 40, marginBottom: 16 }}>⏳</div>
                <div style={{ fontSize: 15, fontWeight: 600, color: "#374151", marginBottom: 8 }}>インポート中...</div>
                <div style={{ fontSize: 13, color: "#9ca3af" }}>データをSupabaseに登録しています。しばらくお待ちください。</div>
              </div>
            )}

            {/* ステップ4: 完了 */}
            {csvStep === "done" && csvImportResult && (
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>{csvImportResult.failed === 0 ? "🎉" : "⚠️"}</div>
                <div style={{ fontSize: 17, fontWeight: 700, color: "#111827", marginBottom: 8 }}>インポート完了</div>
                <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 20 }}>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 28, fontWeight: 700, color: "#10b981" }}>{csvImportResult.success}</div>
                    <div style={{ fontSize: 12, color: "#6b7280" }}>成功</div>
                  </div>
                  {csvImportResult.failed > 0 && (
                    <div style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 28, fontWeight: 700, color: "#ef4444" }}>{csvImportResult.failed}</div>
                      <div style={{ fontSize: 12, color: "#6b7280" }}>失敗</div>
                    </div>
                  )}
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 28, fontWeight: 700, color: "#6b7280" }}>{csvImportResult.total}</div>
                    <div style={{ fontSize: 12, color: "#6b7280" }}>合計</div>
                  </div>
                </div>
                {csvImportResult.errors.length > 0 && (
                  <div style={{ textAlign: "left", marginBottom: 16, padding: 12, background: "#fef2f2", borderRadius: 8, border: "1px solid #fecaca", maxHeight: 120, overflowY: "auto" }}>
                    <div style={{ fontSize: 12, fontWeight: 600, color: "#dc2626", marginBottom: 6 }}>エラー詳細:</div>
                    {csvImportResult.errors.map((e, i) => <div key={i} style={{ fontSize: 11, color: "#991b1b", marginBottom: 2 }}>・{e}</div>)}
                  </div>
                )}
                <button onClick={() => { resetCsvModal(); window.location.reload(); }}
                  style={{ padding: "10px 28px", border: "none", borderRadius: 8, background: "#6366f1", color: "white", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  閉じる
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* トースト通知 */}
      {bulkToast && (
        <div style={{
          position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)",
          background: "#10b981", color: "white", padding: "12px 24px", borderRadius: 10,
          fontSize: 13, fontWeight: 600, boxShadow: "0 4px 16px rgba(16,185,129,0.3)", zIndex: 999,
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <Icon name="check-circle" size={16} color="white" /> {bulkToast}
        </div>
      )}
    </div>
  );
}

// Candidate Detail - 新卒/中途対応
function CandidateDetailPage({ candidateId, onNavigate, candidates: propCandidates, onUpdateCandidate, onDeleteCandidate, can = () => true, emailTemplates = [], isFeedbackMode = false }) {
  const CANDS = propCandidates || CANDIDATES;
  const c = CANDS.find(c => c.id === candidateId) || CANDS[0];
  // c.name が未定義の場合、lastName + firstName で補完
  if (!c.name) c.name = ((c.lastName || '') + ' ' + (c.firstName || '')).trim();
  const isNewGrad = c.recruitType === "新卒";
  const [activeTab, setActiveTab] = useState("timeline");
  const [memoText, setMemoText] = useState(c.notes || "");

  // ===== 日程調整 state =====
  const [schedInterviewers, setSchedInterviewers] = useState(() => {
    try { const s = localStorage.getItem('ats_interviewers'); return s ? JSON.parse(s) : DEFAULT_INTERVIEWERS; } catch(e) { return DEFAULT_INTERVIEWERS; }
  });
  const [schedSelectedInterviewers, setSchedSelectedInterviewers] = useState([]);
  const [schedDateRange, setSchedDateRange] = useState({ start: new Date().toISOString().slice(0,10), end: new Date(Date.now() + 7*86400000).toISOString().slice(0,10) });
  const [schedSlots, setSchedSlots] = useState([]);
  const [schedLoading, setSchedLoading] = useState(false);
  const [schedSelectedSlots, setSchedSelectedSlots] = useState([]);
  const [schedStep, setSchedStep] = useState("select"); // select | slots | send | done
  const [schedFormat, setSchedFormat] = useState("WEB");
  const [schedSendMethod, setSchedSendMethod] = useState("email");
  const [schedSending, setSchedSending] = useState(false);
  const [schedError, setSchedError] = useState("");
  const [schedConfirmedSlot, setSchedConfirmedSlot] = useState(null);
  const [schedSlotMinutes, setSchedSlotMinutes] = useState(45);
  // 会議室 state
  const [meetingRooms, setMeetingRooms] = useState([]);
  const [selectedRoom, setSelectedRoom] = useState(""); // room email
  const [roomsLoading, setRoomsLoading] = useState(false);
  // 予約リンク state
  const [bookingUrl, setBookingUrl] = useState("");
  const [bookingLoading, setBookingLoading] = useState(false);
  const [bookingStatus, setBookingStatus] = useState(null); // null | {status, bookedAt, ...}
  // CX強化 state
  const [welcomeMessage, setWelcomeMessage] = useState("");
  const [interviewGuide, setInterviewGuide] = useState("");

  // 予約済み面接情報
  const [bookedInterviews, setBookedInterviews] = useState([]);
  const [bookedLoading, setBookedLoading] = useState(false);
  const [cancellingBooking, setCancellingBooking] = useState(false);

  const NETLIFY_BASE = (() => { try { const h = window.location.hostname; return (h.includes('netlify') || h.includes('attract') || h.includes('ats.')) ? window.location.origin : ''; } catch(e) { return ''; } })();

  // 予約済み面接を取得
  const fetchBookedInterviews = async () => {
    if (!NETLIFY_BASE) return;
    setBookedLoading(true);
    try {
      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/booking', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'list-booked' }),
      });
      const data = await res.json();
      if (data.success && data.events) {
        const mine = data.events
          .filter(ev => String(ev.candidateId) === String(c.id))
          .sort((a, b) => new Date(a.bookedSlotStart) - new Date(b.bookedSlotStart));
        setBookedInterviews(mine);
      }
    } catch (e) { console.error('予約済み面接取得エラー:', e); }
    setBookedLoading(false);
  };
  React.useEffect(() => { fetchBookedInterviews(); }, [c.id]);

  // 会議室一覧を取得
  const fetchMeetingRooms = async () => {
    if (!NETLIFY_BASE || meetingRooms.length > 0) return; // キャッシュ済みならスキップ
    setRoomsLoading(true);
    try {
      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/booking', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'list-rooms' }),
      });
      const data = await res.json();
      if (data.success && data.rooms) {
        setMeetingRooms(data.rooms);
      }
    } catch (e) { console.error('会議室取得エラー:', e); }
    setRoomsLoading(false);
  };
  // 対面に変更されたら会議室を取得
  React.useEffect(() => {
    if (schedFormat === '対面') fetchMeetingRooms();
  }, [schedFormat]);

  // 直近の予約済み面接（未来優先、なければ最新の過去分）
  const nextInterview = React.useMemo(() => {
    if (bookedInterviews.length === 0) return null;
    const now = new Date();
    const future = bookedInterviews.find(b => new Date(b.bookedSlotStart) > now);
    if (future) return future;
    // 未来の予約がなければ最新の予約を返す（直近の予約済み情報表示用）
    return bookedInterviews[bookedInterviews.length - 1];
  }, [bookedInterviews]);

  // 過去の面接（実施済み）を取得
  const pastInterviews = React.useMemo(() => {
    const now = new Date();
    return bookedInterviews.filter(b => new Date(b.bookedSlotStart) <= now);
  }, [bookedInterviews]);

  // 空き時間取得
  const fetchFreeSlots = async () => {
    if (schedSelectedInterviewers.length === 0) { setSchedError("面接官を選択してください"); return; }
    setSchedLoading(true);
    setSchedError("");
    setSchedSlots([]);
    try {
      const emails = schedSelectedInterviewers.map(id => schedInterviewers.find(iv => iv.id === id)?.email).filter(Boolean);
      const timeMin = new Date(schedDateRange.start + "T00:00:00+09:00").toISOString();
      const timeMax = new Date(schedDateRange.end + "T23:59:59+09:00").toISOString();
      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/google-calendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'freebusy', emails, timeMin, timeMax, slotMinutes: schedSlotMinutes }),
      });
      const data = await res.json();
      if (data.calendarErrors && data.calendarErrors.length > 0) {
        // カレンダーにアクセスできないメールアドレスがある場合
        const errMsgs = data.calendarErrors.map(e => e.message).join('\n');
        setSchedError("⚠ " + errMsgs + "\n\n設定画面で正しいメールアドレスを登録してください。");
      } else if (data.success && data.freeSlots) {
        if (data.freeSlots.length === 0) {
          setSchedError("指定期間に空き時間が見つかりませんでした。日付範囲を変更してお試しください。");
        } else {
          setSchedSlots(data.freeSlots);
          setSchedStep("slots");
        }
      } else {
        setSchedError(data.error || data.message || "空き時間の取得に失敗しました");
      }
    } catch (e) {
      setSchedError("APIエラー: " + e.message);
    }
    setSchedLoading(false);
  };

  // スロット選択トグル
  const toggleSlotSelection = (slot) => {
    setSchedSelectedSlots(prev => {
      const exists = prev.find(s => s.start === slot.start);
      if (exists) return prev.filter(s => s.start !== slot.start);
      if (prev.length >= 3) return prev; // 最大3つ
      return [...prev, slot];
    });
  };

  // 日程案内送信
  const sendScheduleInvitation = async () => {
    if (schedSelectedSlots.length === 0) { setSchedError("候補日時を選択してください"); return; }
    setSchedSending(true);
    setSchedError("");
    try {
      const slotsText = schedSelectedSlots.map((s, i) =>
        `${schedSendMethod === 'line' ? '①②③'[i] : '【候補' + (i+1) + '】'} ${s.date} ${s.startLocal}〜${s.endLocal}`
      ).join('\n');

      const tpl = schedSendMethod === 'email' ? SCHEDULE_EMAIL_TEMPLATES[0] : SCHEDULE_LINE_TEMPLATES[0];
      const interviewerNames = schedSelectedInterviewers.map(id => schedInterviewers.find(iv => iv.id === id)?.name).filter(Boolean).join("・");
      const { stage: inferredStageForInvite, isAdvanced: isAdvancedInvite } = inferSchedulingStage(c.stage, c.substatus);
      const displayStageInvite = inferredStageForInvite || "面接";
      const body = tpl.body
        .replace(/\{\{name\}\}/g, c.name || "")
        .replace(/\{\{stage\}\}/g, displayStageInvite)
        .replace(/\{\{slots\}\}/g, slotsText)
        .replace(/\{\{format\}\}/g, schedFormat === "WEB" ? "オンライン（Google Meet）" : "対面")
        .replace(/\{\{meetInfo\}\}/g, schedFormat === "WEB" ? "※ Google Meet のURLは確定後にお送りいたします。" : "")
        .replace(/\{\{interviewer\}\}/g, interviewerNames);

      if (schedSendMethod === 'email' && c.email) {
        const subject = tpl.subject.replace(/\{\{stage\}\}/g, displayStageInvite);
        const res = await fetch(NETLIFY_BASE + '/.netlify/functions/gmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'send', to: c.email, subject, body, candidateName: c.name }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "メール送信失敗");
      } else if (schedSendMethod === 'line' && c.lineUserId) {
        const res = await fetch(NETLIFY_BASE + '/.netlify/functions/line-send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (typeof tokenStore !== 'undefined' ? tokenStore.accessToken || 'demo' : 'demo') },
          body: JSON.stringify({ action: 'send', lineUserId: c.lineUserId, message: body }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || "LINE送信失敗");
      } else {
        throw new Error(schedSendMethod === 'email' ? "候補者のメールアドレスが未設定です" : "候補者のLINE連携が未設定です");
      }

      // 送信成功時：候補者のステージ・サブステータスを自動更新
      if (isAdvancedInvite) {
        onUpdateCandidate(c.id, { stage: inferredStageForInvite, substatus: "日程調整中" });
      } else if (c.substatus !== "日程調整中") {
        onUpdateCandidate(c.id, { substatus: "日程調整中" });
      }

      setSchedStep("done");
    } catch (e) {
      setSchedError("送信エラー: " + e.message);
    }
    setSchedSending(false);
  };

  // ===== 予約リンク発行 =====
  const generateBookingLink = async () => {
    if (schedSelectedInterviewers.length === 0) { setSchedError("面接官を選択してください"); return; }
    setBookingLoading(true);
    setSchedError("");
    setBookingUrl("");
    try {
      const interviewerEmails = schedSelectedInterviewers.map(id => schedInterviewers.find(iv => iv.id === id)?.email).filter(Boolean);
      const interviewerNames = schedSelectedInterviewers.map(id => schedInterviewers.find(iv => iv.id === id)?.name).filter(Boolean);

      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/booking', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'create-session',
          candidateId: c.id,
          interviewerEmails,
          interviewerNames,
          slotMinutes: schedSlotMinutes,
          startHour: 9,
          endHour: 18,
          dateRangeDays: 14,
          stage: inferSchedulingStage(c.stage, c.substatus).stage || '面接',
          format: schedFormat === 'WEB' ? 'online' : 'offline',
          location: schedFormat === 'WEB' ? '' : '',
          addMeet: schedFormat === 'WEB',
          roomEmail: selectedRoom || '',
          roomName: selectedRoom ? (meetingRooms.find(r => r.email === selectedRoom)?.name || '') : '',
          welcomeMessage: welcomeMessage || '',
          interviewGuide: interviewGuide || '',
          message: '',
        }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '予約リンク作成に失敗しました');
      setBookingUrl(data.bookingUrl);
      setSchedStep("booking-link");
    } catch (e) {
      setSchedError("エラー: " + e.message);
    }
    setBookingLoading(false);
  };

  // 予約リンクをメール送信
  const sendBookingLinkByEmail = async () => {
    if (!bookingUrl || !c.email) { setSchedError("メールアドレスが設定されていません"); return; }
    setSchedSending(true);
    setSchedError("");
    try {
      const { stage: inferredStage, isAdvanced } = inferSchedulingStage(c.stage, c.substatus);
      const displayStage = inferredStage || '面接';
      const subject = `【madoguchi株式会社】${displayStage}の日程予約`;
      const body = `${c.name || '候補者'}様\n\nmadoguchi株式会社の採用担当です。\n${displayStage}の日程をご予約いただきたく、ご連絡いたしました。\n\n下記リンクより、ご都合の良い日時を選択してご予約ください。\n\n▼ 予約ページ\n${bookingUrl}\n\n※ リンクの有効期限は約2週間です。\n※ ご不明な点がございましたら、このメールにご返信ください。\n\nよろしくお願いいたします。\nmadoguchi株式会社 採用担当`;

      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/gmail', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send', to: c.email, subject, body, candidateName: c.name }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'メール送信失敗');

      // 送信成功時：候補者のステージ・サブステータスを自動更新
      if (isAdvanced) {
        onUpdateCandidate(c.id, { stage: inferredStage, substatus: "日程調整中" });
      } else if (c.substatus !== "日程調整中") {
        onUpdateCandidate(c.id, { substatus: "日程調整中" });
      }

      setSchedStep("booking-sent");
    } catch (e) {
      setSchedError("送信エラー: " + e.message);
    }
    setSchedSending(false);
  };

  // 予約リンクをLINE送信
  const sendBookingLinkByLine = async () => {
    if (!bookingUrl || !c.lineUserId) { setSchedError("LINE連携が設定されていません"); return; }
    setSchedSending(true);
    setSchedError("");
    try {
      const { stage: inferredStage, isAdvanced } = inferSchedulingStage(c.stage, c.substatus);
      const displayStage = inferredStage || '面接';
      const candFullName = ((c.lastName || '') + ' ' + (c.firstName || '')).trim();
      const message = `${candFullName}さん、${displayStage}の日程予約のご案内です📅\n\n下記リンクから、ご都合の良い日時を選んでご予約ください。\n\n${bookingUrl}\n\n※ 有効期限は約2週間です。`;

      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/line-send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (typeof tokenStore !== 'undefined' ? tokenStore.accessToken || 'demo' : 'demo') },
        body: JSON.stringify({ action: 'send', candidate_id: c.id, message }),
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'LINE送信失敗');

      // 送信成功時：候補者のステージ・サブステータスを自動更新
      if (isAdvanced) {
        onUpdateCandidate(c.id, { stage: inferredStage, substatus: "日程調整中" });
      } else if (c.substatus !== "日程調整中") {
        onUpdateCandidate(c.id, { substatus: "日程調整中" });
      }

      setSchedStep("booking-sent");
    } catch (e) {
      setSchedError("送信エラー: " + e.message);
    }
    setSchedSending(false);
  };

  // カレンダーに予定を確定登録
  const confirmScheduleSlot = async (slot) => {
    setSchedSending(true);
    setSchedError("");
    try {
      const interviewerNames = schedSelectedInterviewers.map(id => schedInterviewers.find(iv => iv.id === id)?.name).filter(Boolean).join("・");
      const interviewerEmails = schedSelectedInterviewers.map(id => schedInterviewers.find(iv => iv.id === id)?.email).filter(Boolean);
      const attendees = [...interviewerEmails.map(e => ({ email: e }))];
      if (c.email) attendees.push({ email: c.email, name: c.name });

      const res = await fetch(NETLIFY_BASE + '/.netlify/functions/google-calendar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'create',
          summary: `【${c.stage || "面接"}】${c.name}`,
          description: `候補者: ${c.name}\n面接官: ${interviewerNames}\n形式: ${schedFormat === "WEB" ? "オンライン" : "対面"}`,
          startDateTime: slot.start,
          endDateTime: slot.end,
          attendees,
          addMeet: schedFormat === "WEB",
        }),
      });
      const data = await res.json();
      if (data.success) {
        setSchedConfirmedSlot({ ...slot, eventId: data.eventId, meetLink: data.meetLink, htmlLink: data.htmlLink });
        // サブステータスを「予約済」に更新
        if (onUpdateCandidate) {
          onUpdateCandidate(c.id, { substatus: "予約済" });
        }
      } else {
        throw new Error(data.error || "予定作成に失敗しました");
      }
    } catch (e) {
      setSchedError("カレンダー登録エラー: " + e.message);
    }
    setSchedSending(false);
  };

  // ステージ変更用 state
  const [editingStage, setEditingStage] = useState(false);
  const [selectedStage, setSelectedStage] = useState(c.stage);
  const [selectedSub, setSelectedSub] = useState(c.substatus || "");
  const [savingStage, setSavingStage] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [deletingCandidate, setDeletingCandidate] = useState(false);

  // 選択中ステージの定義を取得
  const currentStageDef = getStageDefByName(selectedStage);
  const availableSubs = currentStageDef
    ? [...currentStageDef.substatuses, ...currentStageDef.exitStatuses]
    : [];

  // ステージが変わったらサブステータスをリセット
  const handleStageChange = (newStage) => {
    setSelectedStage(newStage);
    const def = getStageDefByName(newStage);
    if (def) setSelectedSub(def.substatuses[0] || "");
  };

  // 保存
  const handleSaveStage = async () => {
    if (!onUpdateCandidate) return;
    setSavingStage(true);
    await onUpdateCandidate(c.id, { stage: selectedStage, substatus: selectedSub });
    setSavingStage(false);
    setEditingStage(false);
  };

  // キャンセル

  // 音声圧縮ヘルパー: 25MB超のファイルを AudioContext で再エンコード
  const compressAudioBlob = async (srcBlob) => {
    const WHISPER_LIMIT = 24 * 1024 * 1024; // 24MB (余裕をもって)
    if (srcBlob.size <= WHISPER_LIMIT) return srcBlob;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuf = await srcBlob.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arrayBuf);
    // モノラル 16kHz にダウンサンプル
    const targetRate = 16000;
    const offCtx = new OfflineAudioContext(1, Math.ceil(decoded.duration * targetRate), targetRate);
    const src = offCtx.createBufferSource();
    src.buffer = decoded;
    src.connect(offCtx.destination);
    src.start();
    const rendered = await offCtx.startRendering();
    audioCtx.close();
    // WAV にエンコード（Whisper は wav を受け付ける）
    const numSamples = rendered.length;
    const wavBuf = new ArrayBuffer(44 + numSamples * 2);
    const view = new DataView(wavBuf);
    const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    writeStr(0, 'RIFF'); view.setUint32(4, 36 + numSamples * 2, true); writeStr(8, 'WAVE');
    writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
    view.setUint32(24, targetRate, true); view.setUint32(28, targetRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
    writeStr(36, 'data'); view.setUint32(40, numSamples * 2, true);
    const ch = rendered.getChannelData(0);
    let off = 44;
    for (let i = 0; i < numSamples; i++) { const s = Math.max(-1, Math.min(1, ch[i])); view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true); off += 2; }
    return new Blob([wavBuf], { type: 'audio/wav' });
  };

        body: JSON.stringify({ action: 'fetch', candidateEmail: c.email }),
      });
      const data = await res.json();
      if (data.success && data.messages) {
        setMessageHistory(data.messages);
      }
    } catch (err) {
      console.error('メール取得エラー:', err);
    }
    setLoadingMessages(false);
  }, [c.email]);

  useEffect(() => { if (activeTab === "messages") loadMessages(); }, [activeTab, loadMessages]);

  // Gmail API経由でメール送信
  const handleSendEmail = async () => {
    if (!emailSubject.trim() || !emailBody.trim()) {
      setSendError("件名と本文を入力してください");
      return;
    }
    if (!c.email) {
      setSendError("この候補者にはメールアドレスが登録されていません");
      return;
    }
    setSending(true);
    setSendError("");
    setSendSuccess("");

    try {
      const res = await fetch('/.netlify/functions/gmail', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'send',
          to: c.email,
          subject: emailSubject,
          body: emailBody,
          candidateName: c.lastName + " " + c.firstName,
        }),
      });
      const result = await res.json();

      if (!res.ok || !result.success) {
        setSendError(result.error || "送信に失敗しました");
        setSending(false);
        return;
      }

      // Supabaseにも履歴を保存
      await sbApi.insert('messages', {
        candidate_id: c.id,
        direction: 'outbound',
        channel: 'email',
        to_email: c.email,
        subject: emailSubject,
        body: emailBody,
        status: 'sent',
      });

      setSendSuccess("メールを送信しました！");
      setEmailSubject("");
      setEmailBody("");
      setShowCompose(false);
      loadMessages();
      setTimeout(() => setSendSuccess(""), 3000);
    } catch (err) {
      setSendError("送信エラー: " + err.message);
    }
    setSending(false);
  };

  // 実データからタイムラインを構築（8段階対応）— フィードバック情報付き
  const buildTimeline = () => {
    const currentStage = c.stage || "";
    const currentSub = c.substatus || "";
    const currentStageId = candidateToStageId(currentStage);
    const currentDef = getStageDefById(currentStageId);
    const currentOrder = currentDef ? currentDef.order : 0;
    const isExit = isExitStatus(currentSub);

    let prevDate = null;
    return STAGE_DEFINITIONS.map(def => {
      let status = "pending";
      let result = null;
      let date = "未定";
      let fb = null;
      let daysFromPrev = null;

      // このステージに対応するフィードバックを探す
      const matchedFb = feedbacks.find(f => f.stage === def.name);

      if (def.id === currentStageId) {
        status = isExit ? "exit" : "current";
        result = currentSub || null;
        date = c.stageDate || "—";
        if (def.id === "entry") date = c.entryDate || c.stageDate || "—";
        fb = matchedFb || null;
      } else if (def.order < currentOrder) {
        status = "completed";
        result = "通過";
        if (def.id === "entry") date = c.entryDate || "—";
        else if (matchedFb) date = matchedFb.date || "—";
        else date = "—";
        fb = matchedFb || null;
      } else {
        status = "pending";
        date = "未定";
      }

      // 所要日数計算
      if (date && date !== "未定" && date !== "—" && prevDate) {
        try {
          const d1 = new Date(prevDate);
          const d2 = new Date(date);
          if (!isNaN(d1) && !isNaN(d2)) {
            daysFromPrev = Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
          }
        } catch(e) {}
      }
      if (date && date !== "未定" && date !== "—") prevDate = date;

      // FBからスコア平均を計算
      let avgScore = null;
      if (fb && fb.scores) {
        const vals = Object.values(fb.scores).filter(v => typeof v === 'number' && v > 0);
        if (vals.length > 0) avgScore = (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(1);
      }

      return { stage: def.name, date, status, result, color: def.color, fb, avgScore, daysFromPrev };
    });
  };
