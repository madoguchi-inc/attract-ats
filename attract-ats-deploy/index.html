                <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 20, lineHeight: 1.6 }}>
                  アカウントを作成後、ログイン情報をチャット等で担当者に直接お伝えください。
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 18 }}>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>表示名 *</label>
                    <input value={inviteData.display_name} onChange={e => setInviteData({...inviteData, display_name: e.target.value})} placeholder="山田 太郎" style={inputStyle} />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>メールアドレス（ログインID） *</label>
                    <input value={inviteData.email} onChange={e => setInviteData({...inviteData, email: e.target.value})} placeholder="taro@example.com" style={inputStyle} type="email" />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>初期パスワード *</label>
                    <input value={inviteData.password} onChange={e => setInviteData({...inviteData, password: e.target.value})} placeholder="6文字以上" style={inputStyle} type="text" />
                  </div>
                  <div>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>ロール</label>
                    <select value={inviteData.role} onChange={e => setInviteData({...inviteData, role: e.target.value})} style={{ ...inputStyle, cursor: "pointer" }}>
                      {ROLES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label} — {r.description}</option>)}
                    </select>
                  </div>
                </div>
                {inviteError && <div style={{ background: "#fef2f2", color: "#dc2626", padding: "10px 14px", borderRadius: 8, fontSize: 12, marginBottom: 14, border: "1px solid #fecaca" }}>⚠️ {inviteError}</div>}
                <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
                  <button onClick={() => { setInviteOpen(false); setInviteError(""); }}
                    style={{ background: "white", color: "#6b7280", border: "1px solid #d1d5db", borderRadius: 8, padding: "10px 20px", fontSize: 13, cursor: "pointer" }}>キャンセル</button>
                  <button onClick={handleInvite} disabled={inviteLoading}
                    style={{ background: "#6366f1", color: "white", border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 13, fontWeight: 600, cursor: "pointer", opacity: inviteLoading ? 0.6 : 1 }}>
                    {inviteLoading ? "作成中..." : "アカウントを作成"}
                  </button>
                </div>
              </>
            ) : (
              <div style={{ textAlign: "center", padding: "8px 0" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: "#111827", margin: "0 0 8px 0" }}>アカウントを作成しました</h3>
                <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 20, lineHeight: 1.6 }}>
                  以下のログイン情報をチャット等で担当者にお伝えください。
                </div>
                <div style={{ background: "#f9fafb", borderRadius: 10, padding: 16, textAlign: "left", fontSize: 13, lineHeight: 1.8, marginBottom: 16, border: "1px solid #e5e7eb" }}>
                  <div><strong>URL:</strong> {window.location.origin}</div>
                  <div><strong>メール:</strong> {pendingInvites[0]?.email}</div>
                  <div><strong>パスワード:</strong> {pendingInvites[0]?.password}</div>
                  <div><strong>ロール:</strong> {getRoleDef(pendingInvites[0]?.role).label}</div>
                </div>
                <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                  <button onClick={() => { if (pendingInvites[0]) copyLoginInfo(pendingInvites[0]); }}
                    style={{ background: copiedId === pendingInvites[0]?.id ? "#dcfce7" : "white", color: copiedId === pendingInvites[0]?.id ? "#15803d" : "#374151", border: "1px solid #d1d5db", borderRadius: 8, padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.2s" }}>
                    {copiedId === pendingInvites[0]?.id ? "✅ コピー済み" : "📋 ログイン情報をコピー"}
                  </button>
                  <button onClick={() => { setInviteOpen(false); setInviteSuccess(""); }}
                    style={{ background: "#6366f1", color: "white", border: "none", borderRadius: 8, padding: "10px 20px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>閉じる</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ===== 統合アカウント一覧 ===== */}
      {loading ? (
        <div style={{ textAlign: "center", padding: 40, color: "#9ca3af" }}>読み込み中...</div>
      ) : (
        <div style={{ background: "white", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f9fafb", borderBottom: "1px solid #e5e7eb" }}>
                <th style={{ padding: "10px 16px", textAlign: "left", fontWeight: 600, color: "#6b7280", fontSize: 11 }}>ユーザー</th>
                <th style={{ padding: "10px 16px", textAlign: "left", fontWeight: 600, color: "#6b7280", fontSize: 11 }}>ステータス</th>
                <th style={{ padding: "10px 16px", textAlign: "left", fontWeight: 600, color: "#6b7280", fontSize: 11 }}>ロール</th>
                <th style={{ padding: "10px 16px", textAlign: "center", fontWeight: 600, color: "#6b7280", fontSize: 11 }}>操作</th>
              </tr>
            </thead>
            <tbody>
              {/* 登録済みアカウント */}
              {accounts.map((acc, i) => {
                const roleDef = getRoleDef(acc.role);
                const isMe = acc.id === currentUser?.id;
                const isDisabled = acc.is_active === false;
                return (
                  <tr key={acc.id} style={{ borderBottom: "1px solid #f3f4f6", opacity: isDisabled ? 0.5 : 1 }}>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 36, height: 36, borderRadius: 10, background: `${roleDef.color}18`, display: "flex", alignItems: "center", justifyContent: "center", color: roleDef.color, fontSize: 13, fontWeight: 700, border: `1.5px solid ${roleDef.color}44`, flexShrink: 0 }}>
                          {(acc.display_name || "?").charAt(0)}
                        </div>
                        <div>
                          {editingId === acc.id ? (
                            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                              <input value={editName} onChange={e => setEditName(e.target.value)} style={{ padding: "3px 8px", border: "1px solid #6366f1", borderRadius: 6, fontSize: 12, width: 120 }} autoFocus onKeyDown={e => { if (e.key === "Enter") saveDisplayName(acc.id); if (e.key === "Escape") setEditingId(null); }} />
                              <button onClick={() => saveDisplayName(acc.id)} style={{ fontSize: 10, background: "#6366f1", color: "white", border: "none", borderRadius: 4, padding: "3px 8px", cursor: "pointer" }}>保存</button>
                            </div>
                          ) : (
                            <div style={{ fontWeight: 500, color: "#111827", display: "flex", alignItems: "center", gap: 6 }}>
                              {acc.display_name || "—"}
                              {isMe && <span style={{ fontSize: 10, color: "#6366f1", fontWeight: 600, padding: "1px 6px", background: "#eef2ff", borderRadius: 4 }}>自分</span>}
                              <button onClick={() => { setEditingId(acc.id); setEditName(acc.display_name || ""); }} style={{ border: "none", background: "none", cursor: "pointer", padding: 0, opacity: 0.4 }} title="名前を編集">
                                <Icon name="edit" size={11} color="#9ca3af" />
                              </button>
                            </div>
                          )}
                          <div style={{ fontSize: 11, color: "#9ca3af" }}>{acc.email || (isMe && currentUser?.email) || acc.id?.substring(0, 8)}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "12px 16px" }}>
                      <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 6, fontWeight: 500,
                        background: isDisabled ? "#fef2f2" : "#f0fdf4",
                        color: isDisabled ? "#dc2626" : "#15803d",
                        border: `1px solid ${isDisabled ? "#fecaca" : "#bbf7d0"}`
                      }}>
                        {isDisabled ? "無効" : "アクティブ"}
                      </span>
                    </td>
                    <td style={{ padding: "12px 16px" }}>
                      <select value={acc.role || "viewer"} onChange={e => updateRole(acc.id, e.target.value)}
                        style={{ padding: "5px 10px", border: `1.5px solid ${roleDef.color}44`, borderRadius: 8, fontSize: 12, cursor: "pointer", background: `${roleDef.color}08`, color: roleDef.color, fontWeight: 600 }}>
                        {ROLES.map(r => <option key={r.id} value={r.id}>{r.icon} {r.label}</option>)}
                      </select>
                    </td>
                    <td style={{ padding: "12px 16px", textAlign: "center" }}>
                      <div style={{ display: "flex", gap: 6, justifyContent: "center" }}>
                        {!isMe && (
                          <button onClick={() => toggleActive(acc.id, acc.is_active !== false)}
                            style={{ fontSize: 11, padding: "5px 12px", border: "1px solid", borderColor: !isDisabled ? "#fecaca" : "#bbf7d0", borderRadius: 6, background: !isDisabled ? "#fff5f5" : "#f0fdf4", cursor: "pointer", color: !isDisabled ? "#dc2626" : "#15803d", fontWeight: 500 }}>
                            {!isDisabled ? "無効化" : "有効化"}
                          </button>
                        )}
                        {!isMe && deleteConfirm === acc.id ? (
                          <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                            <button onClick={() => deleteAccount(acc.id)} style={{ fontSize: 10, padding: "4px 8px", background: "#dc2626", color: "white", border: "none", borderRadius: 4, cursor: "pointer" }}>削除する</button>
                            <button onClick={() => setDeleteConfirm(null)} style={{ fontSize: 10, padding: "4px 8px", background: "#f3f4f6", color: "#6b7280", border: "none", borderRadius: 4, cursor: "pointer" }}>やめる</button>
                          </div>
                        ) : !isMe ? (
                          <button onClick={() => setDeleteConfirm(acc.id)}
                            style={{ fontSize: 11, padding: "5px 12px", border: "1px solid #e5e7eb", borderRadius: 6, background: "white", cursor: "pointer", color: "#9ca3af" }}>削除</button>
                        ) : null}
                      </div>
                    </td>
                  </tr>
                );
              })}
              {/* 招待中・承諾済みアカウント（DBのaccountsと重複しないもののみ表示） */}
              {pendingInvites.filter(p => !accounts.find(a => a.email === p.email)).map((inv) => {
                const roleDef = getRoleDef(inv.role);
                const isAccepted = inv.status === "accepted";
                const timeAgo = (() => {
                  const diff = Math.floor((Date.now() - new Date(inv.invited_at).getTime()) / 1000);
                  if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
                  if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
                  return `${Math.floor(diff / 86400)}日前`;
                })();
                return (
                  <tr key={"inv-" + inv.id} style={{ borderBottom: "1px solid #f3f4f6", background: isAccepted ? "#f0fdf408" : "#fffbeb08" }}>
                    <td style={{ padding: "12px 16px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 36, height: 36, borderRadius: 10, background: isAccepted ? "#f0fdf4" : "#fefce8", border: `1.5px solid ${isAccepted ? "#bbf7d0" : "#fde68a"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{isAccepted ? "✅" : "📨"}</div>
                        <div>
                          <div style={{ fontWeight: 500, color: "#111827" }}>{inv.display_name}</div>
                          <div style={{ fontSize: 11, color: "#9ca3af" }}>{inv.email} · {timeAgo}に招待</div>
                        </div>
                      </div>
                    </td>
                    <td style={{ padding: "12px 16px" }}>
                      <span style={{ fontSize: 11, padding: "3px 10px", borderRadius: 6, fontWeight: 500,
                        background: isAccepted ? "#f0fdf4" : "#fefce8",
                        color: isAccepted ? "#15803d" : "#a16207",
                        border: `1px solid ${isAccepted ? "#bbf7d0" : "#fde68a"}`
                      }}>{isAccepted ? "承諾済" : "招待中"}</span>
                    </td>
                    <td style={{ padding: "12px 16px" }}>
                      <span style={{ fontSize: 12, padding: "3px 10px", borderRadius: 6, background: `${roleDef.color}08`, color: roleDef.color, fontWeight: 600 }}>{roleDef.icon} {roleDef.label}</span>
                    </td>
                    <td style={{ padding: "12px 16px", textAlign: "center" }}>
                      <div style={{ display: "flex", gap: 6, justifyContent: "center", flexWrap: "wrap" }}>
                        <button onClick={() => copyLoginInfo(inv)}
                          style={{ fontSize: 11, padding: "5px 10px", border: "1px solid #d1d5db", borderRadius: 6, background: copiedId === inv.id ? "#dcfce7" : "white", cursor: "pointer", color: copiedId === inv.id ? "#15803d" : "#374151", fontWeight: 500 }}>
                          {copiedId === inv.id ? "✅ コピー済" : "📋 情報コピー"}
                        </button>
                        {!isAccepted && (
                          <button onClick={() => markAccepted(inv.id)}
                            style={{ fontSize: 11, padding: "5px 10px", border: "1px solid #bbf7d0", borderRadius: 6, background: "#f0fdf4", cursor: "pointer", color: "#15803d" }}>承諾済に</button>
                        )}
                        <button onClick={() => cancelInvite(inv.id)}
                          style={{ fontSize: 11, padding: "5px 10px", border: "1px solid #fecaca", borderRadius: 6, background: "#fff5f5", cursor: "pointer", color: "#dc2626" }}>取消</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {accounts.length === 0 && pendingInvites.length === 0 && (
            <div style={{ padding: 32, textAlign: "center", color: "#9ca3af", fontSize: 13 }}>アカウントがありません</div>
          )}
        </div>
      )}

      {/* ===== 権限マトリクス（下部に折りたたみ表示） ===== */}
      <div style={{ marginTop: 24 }}>
        <button onClick={() => setShowPermissions(!showPermissions)}
          style={{ display: "flex", alignItems: "center", gap: 6, border: "none", background: "none", cursor: "pointer", fontSize: 13, color: "#6b7280", fontWeight: 500, padding: "4px 0" }}>
          <span style={{ transition: "transform 0.2s", transform: showPermissions ? "rotate(90deg)" : "rotate(0)", display: "inline-block" }}>▶</span>
          権限マトリクス
        </button>
        {showPermissions && (
          <div style={{ background: "white", borderRadius: 12, border: "1px solid #e5e7eb", overflow: "hidden", marginTop: 8 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid #e5e7eb", background: "#f9fafb" }}>
                  <th style={{ padding: "10px 16px", textAlign: "left", color: "#6b7280", fontWeight: 600 }}>権限</th>
                  {ROLES.map(r => <th key={r.id} style={{ padding: "10px 12px", textAlign: "center", color: r.color, fontWeight: 600 }}>{r.icon} {r.label}</th>)}
                </tr>
              </thead>
              <tbody>
                {Object.keys(PERMISSIONS.admin).map(perm => (
                  <tr key={perm} style={{ borderBottom: "1px solid #f3f4f6" }}>
                    <td style={{ padding: "8px 16px", color: "#374151", fontWeight: 500 }}>{PERMISSION_LABELS[perm] || perm}</td>
                    {ROLES.map(r => (
                      <td key={r.id} style={{ padding: "8px 12px", textAlign: "center" }}>
                        {PERMISSIONS[r.id][perm] ? <span style={{ color: "#22c55e", fontWeight: 700 }}>✓</span> : <span style={{ color: "#d1d5db" }}>—</span>}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [userRole, setUserRole] = useState("admin"); // デフォルト: admin（初回ユーザー＝管理者）
  const [userProfile, setUserProfile] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [currentPage, setCurrentPage] = useState("dashboard");
  const [selectedCandidateId, setSelectedCandidateId] = useState(null);
  const [recruitFilter, setRecruitFilter] = useState("all");
  const [pipelineFilter, setPipelineFilter] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [showProfileModal, setShowProfileModal] = useState(false);
  // メールテンプレート管理
  const [emailTemplates, setEmailTemplates] = useState(() => {
    try { const saved = localStorage.getItem('ats_email_templates'); return saved ? JSON.parse(saved) : DEFAULT_EMAIL_TEMPLATES; } catch(e) { return DEFAULT_EMAIL_TEMPLATES; }
  });
  const saveEmailTemplates = (tpls) => { setEmailTemplates(tpls); localStorage.setItem('ats_email_templates', JSON.stringify(tpls)); };

  // タスク管理
  const [tasks, setTasks] = useState(() => {
    try { const saved = localStorage.getItem('ats_tasks'); return saved ? JSON.parse(saved) : []; } catch(e) { return []; }
  });
  const saveTasks = useCallback((newTasks) => { setTasks(newTasks); localStorage.setItem('ats_tasks', JSON.stringify(newTasks)); }, []);

  // ステージ変更時にタスクを自動生成
  const autoGenerateTasks = useCallback((candidate, newStage) => {
    const newTasks = generateTasksForStage(candidate, newStage);
    if (newTasks.length > 0) {
      setTasks(prev => {
        const updated = [...prev, ...newTasks];
        localStorage.setItem('ats_tasks', JSON.stringify(updated));
        return updated;
      });
    }
  }, []);
  const [profileEditName, setProfileEditName] = useState("");
  const [migrationStatus, setMigrationStatus] = useState(null);
  const [migrationMsg, setMigrationMsg] = useState('');

  // ========== 通知機能 ==========
  const [showNotifications, setShowNotifications] = useState(false);
  const [showAllNotifications, setShowAllNotifications] = useState(false);
  const [notifications, setNotifications] = useState(() => {
    try { const saved = localStorage.getItem('ats_notifications'); return saved ? JSON.parse(saved) : []; } catch(e) { return []; }
  });
  const notifRef = useRef(null);

  // 外側クリックで閉じる
  useEffect(() => {
    const handleClick = (e) => {
      if (notifRef.current && !notifRef.current.contains(e.target)) setShowNotifications(false);
    };
    if (showNotifications) document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, [showNotifications]);

  // 通知を追加するヘルパー
  const addNotification = useCallback((notif) => {
    setNotifications(prev => {
      const updated = [{ id: Date.now(), time: new Date().toISOString(), read: false, ...notif }, ...prev].slice(0, 50);
      localStorage.setItem('ats_notifications', JSON.stringify(updated));
      return updated;
    });
  }, []);

  // 既読にする
  const markNotifRead = useCallback((id) => {
    setNotifications(prev => {
      const updated = prev.map(n => n.id === id ? { ...n, read: true } : n);
      localStorage.setItem('ats_notifications', JSON.stringify(updated));
      return updated;
    });
  }, []);

  // 全て既読
  const markAllRead = useCallback(() => {
    setNotifications(prev => {
      const updated = prev.map(n => ({ ...n, read: true }));
      localStorage.setItem('ats_notifications', JSON.stringify(updated));
      return updated;
    });
  }, []);

  // 初回ロード時にデモ通知を生成（空なら）
  useEffect(() => {
    if (notifications.length === 0) {
      const now = new Date();
      const demoNotifs = [
        { id: 1, type: "stage_change", title: "ステージ変更", message: "田中 太郎 さんが「一次面接」→「二次面接」に進みました", icon: "📋", time: new Date(now - 1000 * 60 * 5).toISOString(), read: false },
        { id: 2, type: "new_entry", title: "新規エントリー", message: "山田 花子 さんがマイナビ経由でエントリーしました", icon: "🆕", time: new Date(now - 1000 * 60 * 30).toISOString(), read: false },
        { id: 3, type: "schedule", title: "面接予定", message: "鈴木 一郎 さんの二次面接が明日 14:00 に予定されています", icon: "📅", time: new Date(now - 1000 * 60 * 60).toISOString(), read: false },
        { id: 4, type: "task", title: "タスク期限", message: "「適性テスト案内送付」の期限が本日です", icon: "⏰", time: new Date(now - 1000 * 60 * 60 * 2).toISOString(), read: false },
        { id: 5, type: "message", title: "メッセージ受信", message: "佐藤 美咲 さんからメールの返信がありました", icon: "✉️", time: new Date(now - 1000 * 60 * 60 * 3).toISOString(), read: true },
        { id: 6, type: "stage_change", title: "ステージ変更", message: "高橋 翔太 さんが「最終面接」→「内定」になりました", icon: "📋", time: new Date(now - 1000 * 60 * 60 * 5).toISOString(), read: true },
        { id: 7, type: "automation", title: "自動送信完了", message: "説明会案内メールを 5名 に自動送信しました", icon: "🤖", time: new Date(now - 1000 * 60 * 60 * 8).toISOString(), read: true },
        { id: 8, type: "new_entry", title: "新規エントリー", message: "リクナビ経由で 3名 の新規エントリーがありました", icon: "🆕", time: new Date(now - 1000 * 60 * 60 * 24).toISOString(), read: true },
      ];
      setNotifications(demoNotifs);
      localStorage.setItem('ats_notifications', JSON.stringify(demoNotifs));
    }
  }, []);

  // profile取得
  const loadProfile = useCallback(async (userId, email) => {
    if (!SUPABASE_READY || !userId) {
      setUserRole("admin");
      setUserProfile({ display_name: email || "デモユーザー", role: "admin" });
      return;
    }
    const { data } = await sbApi.select('profiles', 'id=eq.' + userId);
    if (data && data.length > 0) {
      setUserProfile(data[0]);
      setUserRole(data[0].role || "admin");
    } else {
      // profileがない場合は最初のユーザー→admin として自動作成
      const displayName = email ? email.split("@")[0] : "管理者";
      const profile = { id: userId, role: "admin", display_name: displayName, email: email || "", is_active: true };
      await sbApi.insert('profiles', profile).catch(() => {});
      setUserProfile(profile);
      setUserRole("admin");
    }
  }, []);

  const can = (permission) => hasPermission(userRole, permission);

  const openProfileEdit = () => {
    setProfileEditName(userProfile?.display_name || "");
    setShowProfileModal(true);
  };
  const saveProfile = async () => {
    if (!profileEditName.trim()) return;
    if (SUPABASE_READY && user?.id) {
      await fetch(SUPABASE_URL + '/rest/v1/profiles?id=eq.' + user.id, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tokenStore.accessToken, 'Prefer': 'return=representation' },
        body: JSON.stringify({ display_name: profileEditName.trim() })
      });
      await loadProfile(user.id, user.email);
    } else {
      setUserProfile(prev => ({ ...prev, display_name: profileEditName.trim() }));
    }
    setShowProfileModal(false);
  };

  // データフック
  const { candidates, loading: dataLoading, addCandidate, updateCandidate: rawUpdateCandidate, bulkUpdateStatus, refresh } = useSupabaseCandidates(recruitFilter);

  // ステージ変更時にタスクも自動生成 + 通知するラッパー
  const updateCandidate = useCallback(async (id, updates) => {
    await rawUpdateCandidate(id, updates);
    const cand = candidates.find(c => c.id === id);
    if (updates.stage && cand) {
      autoGenerateTasks({ ...cand, ...updates }, updates.stage);
      addNotification({
        type: "stage_change", title: "ステージ変更",
        message: `${cand.lastName} ${cand.firstName} さんが「${cand.stage}」→「${updates.stage}」に変更されました`,
        icon: "📋",
      });
    }
  }, [rawUpdateCandidate, candidates, autoGenerateTasks, addNotification]);

  const handleMigration = async () => {
    if (!window.confirm('候補者データを新しい8ステージ形式に一括変換します。\\n（既存のステージ・サブステータスが上書きされます）\\n\\n実行しますか？')) return;
    setMigrationStatus('running');
    const ok = await runDataMigration((msg) => setMigrationMsg(msg));
    if (ok) {
      setMigrationStatus('done');
      await refresh();
      setTimeout(() => { setMigrationStatus(null); setMigrationMsg(''); }, 5000);
    } else {
      setMigrationStatus(null);
    }
  };

  // 認証状態チェック
  useEffect(() => {
    if (SUPABASE_READY) {
      sbApi.getUser().then(async u => {
        setUser(u || null);
        if (u) await loadProfile(u.id, u.email);
        setAuthChecked(true);
      });
    } else {
      setAuthChecked(true);
    }
  }, []);

  const handleLogout = async () => {
    if (SUPABASE_READY) await sbApi.signOut();
    setUser(null);
  };

  // 未ログイン → ログイン画面
  if (authChecked && !user) {
    return <LoginPage onLogin={async (u) => { setUser(u); await loadProfile(u.id, u.email); }} />;
  }
  if (!authChecked) {
    return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#f5f5f7" }}><div style={{ fontSize: 14, color: "#6b7280" }}>読み込み中...</div></div>;
  }

  const navigate = (page, id) => {
    setCurrentPage(page);
    if (id) setSelectedCandidateId(id);
    if (page !== "candidates" || !id) setPipelineFilter(null);
  };

  const navigateFromPipeline = (stageName, substatus) => {
    setPipelineFilter({ stageName, substatus });
    setCurrentPage("candidates");
  };

  const renderPage = () => {
    switch (currentPage) {
      case "dashboard": return <DashboardPage onNavigate={navigate} recruitFilter={recruitFilter} tasks={tasks} />;
      case "candidates": return <CandidatesPage onNavigate={navigate} recruitFilter={recruitFilter} pipelineFilter={pipelineFilter} onClearPipelineFilter={() => setPipelineFilter(null)} candidates={candidates} onUpdateCandidate={updateCandidate} onBulkUpdateStatus={bulkUpdateStatus} onShowAddModal={() => setShowAddModal(true)} can={can} emailTemplates={emailTemplates} />;
      case "candidate-detail": return <CandidateDetailPage candidateId={selectedCandidateId} onNavigate={navigate} candidates={candidates} onUpdateCandidate={updateCandidate} can={can} emailTemplates={emailTemplates} />;
      case "pipeline": return <PipelinePage recruitFilter={recruitFilter} onNavigateFromPipeline={navigateFromPipeline} candidates={candidates} />;
      case "messages": return <MessagesPage candidates={candidates} emailTemplates={emailTemplates} onNavigate={navigate} />;
      case "schedule": return <SchedulePage recruitFilter={recruitFilter} candidates={candidates} onNavigate={navigate} />;
      case "interview-fb": return <InterviewFBPage onNavigate={navigate} />;
      case "automation": return <AutomationPage emailTemplates={emailTemplates} />;
      case "analytics": return <AnalyticsPage recruitFilter={recruitFilter} candidates={candidates} />;
      case "tasks": return <TasksPage tasks={tasks} onUpdateTasks={saveTasks} candidates={candidates} onNavigate={navigate} />;
      case "agents": return <AgentsPage candidates={candidates} />;
      case "accounts": return can("manageAccounts") ? <AccountsPage currentUser={user} currentProfile={userProfile} onRefreshProfile={() => loadProfile(user?.id, user?.email)} /> : <div style={{ padding: 40, textAlign: "center", color: "#9ca3af" }}>アクセス権限がありません</div>;
      case "settings": return can("editSettings") ? <SettingsPage emailTemplates={emailTemplates} onSaveTemplates={saveEmailTemplates} /> : <div style={{ padding: 40, textAlign: "center", color: "#9ca3af" }}>アクセス権限がありません</div>;
      default: return (
        <div style={{ padding: 24, display: "flex", alignItems: "center", justifyContent: "center", height: "60vh" }}>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🚧</div>
            <h2 style={{ fontSize: 18, fontWeight: 600, color: "#374151", marginBottom: 4 }}>この画面は開発中です</h2>
            <p style={{ fontSize: 13, color: "#9ca3af" }}>次のフェーズで実装予定です</p>
          </div>
        </div>
      );
    }
  };

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#f5f5f7", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif" }}>
      <Sidebar currentPage={currentPage} onNavigate={navigate} userRole={userRole} userProfile={userProfile} onEditProfile={openProfileEdit} />
      <div style={{ flex: 1, overflowY: "auto", maxHeight: "100vh" }}>
        <div style={{ background: "white", borderBottom: "1px solid #e5e7eb", padding: "10px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <RecruitTypeSelector value={recruitFilter} onChange={setRecruitFilter} />
            {SUPABASE_READY && (
              <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 6, background: "#dcfce7", color: "#15803d", fontWeight: 600 }}>DB接続中</span>
            )}
            {!SUPABASE_READY && (
              <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 6, background: "#fef3c7", color: "#92400e", fontWeight: 600 }}>デモモード</span>
            )}
            <div style={{ position: "relative", width: 260 }}>
              <Icon name="search" size={14} color="#9ca3af" style={{ position: "absolute", left: 8, top: 8 }} />
              <input placeholder="候補者・タスクを検索..." style={{ width: "100%", padding: "6px 6px 6px 28px", border: "1px solid #e5e7eb", borderRadius: 8, fontSize: 12, outline: "none", boxSizing: "border-box" }} />
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            {SUPABASE_READY && migrationStatus !== 'done' && (
              <button onClick={handleMigration} disabled={migrationStatus === 'running'}
                style={{ fontSize: 11, color: "white", background: migrationStatus === 'running' ? '#9ca3af' : '#f59e0b', border: "none", borderRadius: 6, padding: "4px 12px", cursor: migrationStatus === 'running' ? "default" : "pointer", fontWeight: 600, whiteSpace: 'nowrap' }}>
                {migrationStatus === 'running' ? migrationMsg || '実行中...' : 'データ移行'}
              </button>
            )}
            {migrationStatus === 'done' && (
              <span style={{ fontSize: 11, color: '#15803d', fontWeight: 600 }}>{migrationMsg}</span>
            )}
            <div ref={notifRef} style={{ position: "relative" }}>
              <button onClick={() => setShowNotifications(!showNotifications)} style={{ position: "relative", background: "none", border: "none", cursor: "pointer", padding: 4 }}>
                <Icon name="bell" size={18} color={showNotifications ? "#6366f1" : "#6b7280"} />
                {notifications.filter(n => !n.read).length > 0 && (
                  <div style={{ position: "absolute", top: -2, right: -2, minWidth: 16, height: 16, borderRadius: 8, background: "#ef4444", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "white", fontWeight: 700, padding: "0 4px" }}>
                    {notifications.filter(n => !n.read).length}
                  </div>
                )}
              </button>

              {/* 通知ドロップダウン */}
              {showNotifications && (
                <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, width: 380, background: "white", borderRadius: 14, boxShadow: "0 12px 40px rgba(0,0,0,0.18)", border: "1px solid #e5e7eb", zIndex: 9999, overflow: "hidden" }}>
                  {/* ヘッダー */}
                  <div style={{ padding: "14px 18px", borderBottom: "1px solid #e5e7eb", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 14, fontWeight: 700, color: "#111827" }}>通知</span>
                      {notifications.filter(n => !n.read).length > 0 && (
                        <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 10, background: "#eef2ff", color: "#4338ca", fontWeight: 600 }}>
                          {notifications.filter(n => !n.read).length}件 未読
                        </span>
                      )}
                    </div>
                    {notifications.filter(n => !n.read).length > 0 && (
                      <button onClick={markAllRead} style={{ fontSize: 11, color: "#6366f1", background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>
                        すべて既読にする
                      </button>
                    )}
                  </div>

                  {/* 通知リスト */}
                  <div style={{ maxHeight: 400, overflowY: "auto" }}>
                    {notifications.length === 0 ? (
                      <div style={{ padding: 40, textAlign: "center", color: "#9ca3af", fontSize: 13 }}>通知はありません</div>
                    ) : notifications.map(notif => {
                      const timeAgo = (() => {
                        const diff = Math.floor((Date.now() - new Date(notif.time).getTime()) / 1000);
                        if (diff < 60) return "たった今";
                        if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
                        if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
                        return `${Math.floor(diff / 86400)}日前`;
                      })();
                      const typeColors = {
                        stage_change: { bg: "#eef2ff", border: "#c7d2fe" },
                        new_entry: { bg: "#f0fdf4", border: "#bbf7d0" },
                        schedule: { bg: "#fefce8", border: "#fde68a" },
                        task: { bg: "#fff7ed", border: "#fed7aa" },
                        message: { bg: "#f0f9ff", border: "#bae6fd" },
                        automation: { bg: "#faf5ff", border: "#e9d5ff" },
                      };
                      const tc = typeColors[notif.type] || { bg: "#f9fafb", border: "#e5e7eb" };
                      return (
                        <div key={notif.id}
                          onClick={() => { markNotifRead(notif.id); if (notif.type === "stage_change" || notif.type === "new_entry") navigate("candidates"); else if (notif.type === "schedule") navigate("schedule"); else if (notif.type === "task") navigate("tasks"); else if (notif.type === "message") navigate("messages"); setShowNotifications(false); }}
                          style={{
                            padding: "12px 18px", borderBottom: "1px solid #f3f4f6", cursor: "pointer",
                            background: notif.read ? "white" : "#fafaff",
                            display: "flex", gap: 12, alignItems: "flex-start",
                            transition: "background 0.15s",
                          }}
                          onMouseEnter={(e) => e.currentTarget.style.background = "#f9fafb"}
                          onMouseLeave={(e) => e.currentTarget.style.background = notif.read ? "white" : "#fafaff"}>
                          <div style={{ width: 36, height: 36, borderRadius: 10, background: tc.bg, border: `1px solid ${tc.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>
                            {notif.icon}
                          </div>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 2 }}>
                              <span style={{ fontSize: 12, fontWeight: notif.read ? 500 : 700, color: "#111827" }}>{notif.title}</span>
                              <span style={{ fontSize: 10, color: "#9ca3af", flexShrink: 0, marginLeft: 8 }}>{timeAgo}</span>
                            </div>
                            <div style={{ fontSize: 12, color: "#6b7280", lineHeight: 1.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{notif.message}</div>
                          </div>
                          {!notif.read && <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#6366f1", flexShrink: 0, marginTop: 4 }} />}
                        </div>
                      );
                    })}
                  </div>

                  {/* フッター */}
                  <div style={{ padding: "10px 18px", borderTop: "1px solid #e5e7eb", textAlign: "center" }}>
                    <button onClick={() => { setShowNotifications(false); setShowAllNotifications(true); }} style={{ fontSize: 12, color: "#6366f1", background: "none", border: "none", cursor: "pointer", fontWeight: 500 }}>
                      すべての通知を見る
                    </button>
                  </div>
                </div>
              )}
            </div>
            <button onClick={handleLogout} style={{ fontSize: 11, color: "#6b7280", background: "none", border: "1px solid #e5e7eb", borderRadius: 6, padding: "4px 10px", cursor: "pointer" }}>ログアウト</button>
          </div>
        </div>
        {renderPage()}
      </div>

      {/* 全通知モーダル */}
      {showAllNotifications && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999 }}
          onClick={e => { if (e.target === e.currentTarget) setShowAllNotifications(false); }}>
          <div style={{ background: "white", borderRadius: 16, width: 600, maxWidth: "92vw", maxHeight: "85vh", boxShadow: "0 20px 60px rgba(0,0,0,0.2)", animation: "fadeIn 0.2s", display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* ヘッダー */}
            <div style={{ padding: "18px 24px", borderBottom: "1px solid #e5e7eb", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#111827" }}>🔔 すべての通知</span>
                <span style={{ fontSize: 12, padding: "2px 10px", borderRadius: 10, background: "#f3f4f6", color: "#6b7280", fontWeight: 500 }}>{notifications.length}件</span>
                {notifications.filter(n => !n.read).length > 0 && (
                  <span style={{ fontSize: 12, padding: "2px 10px", borderRadius: 10, background: "#eef2ff", color: "#4338ca", fontWeight: 600 }}>
                    {notifications.filter(n => !n.read).length}件 未読
                  </span>
                )}
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {notifications.filter(n => !n.read).length > 0 && (
                  <button onClick={markAllRead} style={{ fontSize: 11, color: "#6366f1", background: "none", border: "1px solid #e0e7ff", borderRadius: 6, padding: "4px 12px", cursor: "pointer", fontWeight: 500 }}>
                    すべて既読にする
                  </button>
                )}
                <button onClick={() => setShowAllNotifications(false)} style={{ border: "none", background: "#f3f4f6", borderRadius: 8, width: 32, height: 32, cursor: "pointer", fontSize: 16, color: "#6b7280", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
              </div>
            </div>
            {/* 通知リスト */}
            <div style={{ overflowY: "auto", flex: 1 }}>
              {notifications.length === 0 ? (
                <div style={{ padding: 60, textAlign: "center", color: "#9ca3af", fontSize: 13 }}>通知はありません</div>
              ) : notifications.map(notif => {
                const timeAgo = (() => {
                  const diff = Math.floor((Date.now() - new Date(notif.time).getTime()) / 1000);
                  if (diff < 60) return "たった今";
                  if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
                  if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
                  return `${Math.floor(diff / 86400)}日前`;
                })();
                const typeColors = {
                  stage_change: { bg: "#eef2ff", border: "#c7d2fe", label: "ステージ変更" },
                  new_entry: { bg: "#f0fdf4", border: "#bbf7d0", label: "新規エントリー" },
                  schedule: { bg: "#fefce8", border: "#fde68a", label: "スケジュール" },
                  task: { bg: "#fff7ed", border: "#fed7aa", label: "タスク" },
                  message: { bg: "#f0f9ff", border: "#bae6fd", label: "メッセージ" },
                  automation: { bg: "#faf5ff", border: "#e9d5ff", label: "自動化" },
                };
                const tc = typeColors[notif.type] || { bg: "#f9fafb", border: "#e5e7eb", label: "その他" };
                return (
                  <div key={notif.id}
                    onClick={() => { markNotifRead(notif.id); if (notif.type === "stage_change" || notif.type === "new_entry") navigate("candidates"); else if (notif.type === "schedule") navigate("schedule"); else if (notif.type === "task") navigate("tasks"); else if (notif.type === "message") navigate("messages"); setShowAllNotifications(false); }}
                    style={{
                      padding: "14px 24px", borderBottom: "1px solid #f3f4f6", cursor: "pointer",
                      background: notif.read ? "white" : "#fafaff",
                      display: "flex", gap: 14, alignItems: "flex-start",
                      transition: "background 0.15s",
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.background = "#f9fafb"}
                    onMouseLeave={(e) => e.currentTarget.style.background = notif.read ? "white" : "#fafaff"}>
                    <div style={{ width: 40, height: 40, borderRadius: 10, background: tc.bg, border: `1px solid ${tc.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>
                      {notif.icon}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <span style={{ fontSize: 13, fontWeight: notif.read ? 500 : 700, color: "#111827" }}>{notif.title}</span>
                          <span style={{ fontSize: 10, padding: "1px 6px", borderRadius: 4, background: tc.bg, color: "#6b7280", border: `1px solid ${tc.border}` }}>{tc.label}</span>
                        </div>
                        <span style={{ fontSize: 11, color: "#9ca3af", flexShrink: 0, marginLeft: 8 }}>{timeAgo}</span>
                      </div>
                      <div style={{ fontSize: 13, color: "#4b5563", lineHeight: 1.6 }}>{notif.message}</div>
                    </div>
                    {!notif.read && <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#6366f1", flexShrink: 0, marginTop: 6 }} />}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* 候補者追加モーダル */}
      {showAddModal && <AddCandidateModal onClose={() => setShowAddModal(false)} onAdd={async (c) => { const result = await addCandidate(c); if (result) autoGenerateTasks({ ...c, id: result.id || result[0]?.id || Date.now() }, c.stage || "エントリー"); setShowAddModal(false); }} />}

      {/* プロフィール編集モーダル */}
      {showProfileModal && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.5)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}
          onClick={e => { if (e.target === e.currentTarget) setShowProfileModal(false); }}>
          <div style={{ background: "white", borderRadius: 16, padding: 28, boxShadow: "0 20px 60px rgba(0,0,0,0.3)", width: "100%", maxWidth: 420 }}>
            <h3 style={{ fontSize: 17, fontWeight: 700, color: "#111827", marginBottom: 20 }}>プロフィール編集</h3>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", display: "block", marginBottom: 6 }}>表示名</label>
              <input value={profileEditName} onChange={e => setProfileEditName(e.target.value)}
                style={{ width: "100%", padding: "10px 14px", border: "2px solid #e5e7eb", borderRadius: 10, fontSize: 14, outline: "none", boxSizing: "border-box", transition: "border 0.2s" }}
                onFocus={e => e.target.style.borderColor = "#6366f1"} onBlur={e => e.target.style.borderColor = "#e5e7eb"}
                placeholder="名前を入力" autoFocus
                onKeyDown={e => { if (e.key === "Enter") saveProfile(); }} />
            </div>
            <div style={{ marginBottom: 20, padding: "10px 14px", background: "#f9fafb", borderRadius: 8, fontSize: 12, color: "#6b7280" }}>
              <div><strong>メール:</strong> {user?.email || "—"}</div>
              <div><strong>ロール:</strong> {getRoleDef(userRole).icon} {getRoleDef(userRole).label}</div>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setShowProfileModal(false)}
                style={{ padding: "8px 20px", border: "1px solid #d1d5db", borderRadius: 8, background: "white", color: "#374151", fontSize: 13, cursor: "pointer" }}>キャンセル</button>
              <button onClick={saveProfile}
                style={{ padding: "8px 20px", border: "none", borderRadius: 8, background: "#6366f1", color: "white", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>保存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// 候補者追加モーダル
// ============================================================
function AddCandidateModal({ onClose, onAdd }) {
  const [form, setForm] = useState({
    recruitType: "新卒", lastName: "", firstName: "", lastNameKana: "", firstNameKana: "",
    email: "", phone: "", birthDate: "",
    university: "", faculty: "", department: "", gradYear: 2027, majorType: "文系", graduationPeriod: "2027年3月",
    company: "", position: "", experience: "",
    route: "", aspiration: 3, agent: "", gender: "男性", notes: "",
  });
  const [saving, setSaving] = useState(false);
  const set = (key, val) => setForm(prev => ({ ...prev, [key]: val }));
  const isNew = form.recruitType === "新卒";

  const handleSave = async () => {
    if (!form.lastName || !form.firstName) return;
    setSaving(true);
    await onAdd({
      ...form,
      stage: "エントリー/受付済",
      substatus: "受付済",
      status: "新規",
      format: null,
      score: null,
      experience: form.experience ? parseInt(form.experience) : null,
      entryDate: new Date().toISOString().split("T")[0],
    });
    setSaving(false);
  };

  const inputStyle = { width: "100%", padding: "8px 12px", border: "1px solid #d1d5db", borderRadius: 8, fontSize: 13, outline: "none", boxSizing: "border-box" };
  const labelStyle = { display: "block", fontSize: 11, fontWeight: 600, color: "#374151", marginBottom: 4 };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }} onClick={onClose}>
      <div style={{ background: "white", borderRadius: 16, padding: 28, width: 520, maxHeight: "80vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }} onClick={e => e.stopPropagation()}>
        <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 20, color: "#111827" }}>候補者を新規登録</h2>

        {/* 採用区分 */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {["新卒", "中途"].map(t => (
            <button key={t} onClick={() => set("recruitType", t)}
              style={{ flex: 1, padding: "8px", border: form.recruitType === t ? "2px solid #4338ca" : "1px solid #d1d5db", borderRadius: 8, background: form.recruitType === t ? "#eef2ff" : "white", fontSize: 13, fontWeight: 600, cursor: "pointer", color: form.recruitType === t ? "#4338ca" : "#6b7280" }}>
              {t}
            </button>
          ))}
        </div>

        {/* 基本情報 */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
          <div><label style={labelStyle}>姓 *</label><input value={form.lastName} onChange={e => set("lastName", e.target.value)} style={inputStyle} placeholder="山田" /></div>
          <div><label style={labelStyle}>名 *</label><input value={form.firstName} onChange={e => set("firstName", e.target.value)} style={inputStyle} placeholder="花子" /></div>
          <div><label style={labelStyle}>セイ</label><input value={form.lastNameKana} onChange={e => set("lastNameKana", e.target.value)} style={inputStyle} placeholder="ヤマダ" /></div>
          <div><label style={labelStyle}>メイ</label><input value={form.firstNameKana} onChange={e => set("firstNameKana", e.target.value)} style={inputStyle} placeholder="ハナコ" /></div>
          <div><label style={labelStyle}>メール</label><input type="email" value={form.email} onChange={e => set("email", e.target.value)} style={inputStyle} placeholder="email@example.com" /></div>
          <div><label style={labelStyle}>電話</label><input value={form.phone} onChange={e => set("phone", e.target.value)} style={inputStyle} placeholder="090-1234-5678" /></div>
          <div><label style={labelStyle}>生年月日</label><input type="date" value={form.birthDate} onChange={e => set("birthDate", e.target.value)} style={inputStyle} /></div>
          <div><label style={labelStyle}>性別</label>
            <select value={form.gender} onChange={e => set("gender", e.target.value)} style={inputStyle}>
              <option value="男性">男性</option><option value="女性">女性</option><option value="その他">その他</option>
            </select>
          </div>
        </div>

        {/* 新卒 or 中途固有 */}
        {isNew ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            <div><label style={labelStyle}>大学</label><input value={form.university} onChange={e => set("university", e.target.value)} style={inputStyle} placeholder="○○大学" /></div>
            <div><label style={labelStyle}>学部</label><input value={form.faculty} onChange={e => set("faculty", e.target.value)} style={inputStyle} placeholder="○○学部" /></div>
            <div><label style={labelStyle}>学科</label><input value={form.department} onChange={e => set("department", e.target.value)} style={inputStyle} placeholder="○○学科" /></div>
            <div><label style={labelStyle}>文理</label>
              <select value={form.majorType} onChange={e => set("majorType", e.target.value)} style={inputStyle}>
                <option value="文系">文系</option><option value="理系">理系</option>
              </select>
            </div>
            <div><label style={labelStyle}>卒業年</label><input type="number" value={form.gradYear} onChange={e => set("gradYear", parseInt(e.target.value))} style={inputStyle} /></div>
            <div><label style={labelStyle}>卒業予定時期</label><input value={form.graduationPeriod} onChange={e => set("graduationPeriod", e.target.value)} style={inputStyle} placeholder="2027年3月" /></div>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            <div><label style={labelStyle}>現職企業</label><input value={form.company} onChange={e => set("company", e.target.value)} style={inputStyle} /></div>
            <div><label style={labelStyle}>職種</label><input value={form.position} onChange={e => set("position", e.target.value)} style={inputStyle} /></div>
            <div><label style={labelStyle}>経験年数</label><input type="number" value={form.experience} onChange={e => set("experience", e.target.value)} style={inputStyle} /></div>
            <div />
          </div>
        )}

        {/* メタ情報 */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
          <div><label style={labelStyle}>応募経路</label><input value={form.route} onChange={e => set("route", e.target.value)} style={inputStyle} placeholder="マイナビ、紹介会社 等" /></div>
          <div><label style={labelStyle}>紹介会社/エージェント</label><input value={form.agent} onChange={e => set("agent", e.target.value)} style={inputStyle} /></div>
          <div><label style={labelStyle}>志望度</label>
            <select value={form.aspiration} onChange={e => set("aspiration", parseInt(e.target.value))} style={inputStyle}>
              {[1,2,3,4,5].map(n => <option key={n} value={n}>{n} - {"★".repeat(n)}</option>)}
            </select>
          </div>
        </div>
        <div style={{ marginBottom: 24 }}>
          <label style={labelStyle}>メモ</label>
          <textarea value={form.notes} onChange={e => set("notes", e.target.value)} style={{ ...inputStyle, minHeight: 60, resize: "vertical" }} placeholder="自由記入欄" />
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={{ padding: "8px 20px", border: "1px solid #d1d5db", borderRadius: 8, background: "white", fontSize: 13, cursor: "pointer", color: "#374151" }}>キャンセル</button>
          <button onClick={handleSave} disabled={saving || !form.lastName || !form.firstName}
            style={{ padding: "8px 24px", border: "none", borderRadius: 8, background: (!form.lastName || !form.firstName) ? "#a5b4fc" : "#4338ca", color: "white", fontSize: 13, fontWeight: 600, cursor: saving ? "default" : "pointer" }}>
            {saving ? "保存中..." : "登録する"}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
